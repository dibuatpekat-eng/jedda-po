<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jedda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #f0ede8; }
body { font-family: 'IBM Plex Mono', monospace; -webkit-font-smoothing: antialiased; color: #111; min-height: 100vh; background: #f0ede8; }

/* ── channel picker screen ── */
.channel-screen { position: fixed; inset: 0; background: #f0ede8; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
.channel-brand { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; font-weight: 400; color: #111; margin-bottom: 56px; text-align: center; }
.channel-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #aaa; font-weight: 300; margin-bottom: 24px; text-align: center; }
.channel-buttons { display: flex; flex-direction: column; gap: 10px; width: 240px; }
.channel-btn { padding: 14px 20px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 300; color: #333; border: 1px solid #ccc; background: transparent; cursor: pointer; text-align: center; transition: all 0.15s; -webkit-tap-highlight-color: transparent; letter-spacing: 1px; }
.channel-btn:hover, .channel-btn:active { border-color: #111; background: #111; color: #f0ede8; }
.channel-back { margin-top: 20px; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #aaa; background: none; border: none; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-weight: 300; padding: 0; text-align: center; }

/* ── PIN screen ── */
.pin-screen { position: fixed; inset: 0; background: #f0ede8; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
.pin-brand { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; font-weight: 400; color: #111; margin-bottom: 8px; }
.pin-channel { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: #aaa; font-weight: 300; margin-bottom: 48px; }
.pin-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #aaa; font-weight: 300; margin-bottom: 20px; }
.pin-dots { display: flex; gap: 14px; margin-bottom: 8px; }
.pin-dot { width: 7px; height: 7px; border-radius: 50%; border: 1px solid #ccc; background: transparent; transition: background 0.15s, border-color 0.15s; }
.pin-dot.filled { background: #111; border-color: #111; }
.pin-error { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: #c0392b; font-weight: 300; opacity: 0; transition: opacity 0.2s; height: 32px; display: flex; align-items: center; }
.pin-error.show { opacity: 1; }
.pin-keypad { display: grid; grid-template-columns: repeat(3, 72px); border-top: 1px solid #e0dbd4; border-left: 1px solid #e0dbd4; }
.pin-key { height: 56px; border: none; border-right: 1px solid #e0dbd4; border-bottom: 1px solid #e0dbd4; background: transparent; font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 300; color: #111; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; transition: background 0.1s; -webkit-tap-highlight-color: transparent; }
.pin-key:active { background: #eae6e0; }
.pin-key.del { font-size: 11px; color: #aaa; letter-spacing: 1px; text-transform: uppercase; }
.pin-key.empty { pointer-events: none; }
.pin-back { margin-top: 24px; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #aaa; background: none; border: none; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-weight: 300; padding: 0; }

#root { max-width: 600px; margin: 0 auto; min-height: 100vh; position: relative; }

.header { display: flex; justify-content: space-between; align-items: flex-start; padding: 32px 28px 0; }
.header-brand { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; font-weight: 400; color: #111; }
.header-meta { text-align: right; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #888; line-height: 1.9; font-weight: 300; }
.header-rule { margin: 24px 0 0; border: none; border-top: 1px solid #ccc; }
.items-eyebrow { padding: 0 28px; margin-top: 40px; display: flex; justify-content: space-between; align-items: baseline; }
.eyebrow-left { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: #666; font-weight: 400; }
.eyebrow-right { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: #999; font-weight: 300; }
.cat-block { padding: 0 28px; margin-top: 32px; }
.cat-label { font-size: 8px; letter-spacing: 4px; text-transform: uppercase; color: #aaa; margin-bottom: 12px; font-weight: 300; }
.item-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.item-card { border: 1px solid #d8d4ce; padding: 16px 14px 14px; cursor: pointer; position: relative; user-select: none; background: #f0ede8; transition: border-color 0.15s, background 0.15s; }
.item-card:active { opacity: 0.6; }
.item-card.has-qty { border-color: #111; background: #111; }
.item-card-name { font-size: 13px; font-weight: 400; color: #222; line-height: 1.3; margin-bottom: 7px; font-family: 'IBM Plex Sans', sans-serif; transition: color 0.15s; }
.item-card.has-qty .item-card-name { color: #f0ede8; }
.item-card-colors { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: #aaa; font-weight: 300; transition: color 0.15s; }
.item-card.has-qty .item-card-colors { color: #888; }
.item-card-badge { position: absolute; top: 10px; right: 10px; background: #f0ede8; color: #111; font-size: 10px; font-weight: 400; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; }
.item-card.soldout { opacity: 0.4; pointer-events: none; }
.item-card.disabled { opacity: 0.35; pointer-events: none; cursor: default; }
.loading-bar { padding: 0 28px; margin-top: 40px; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #bbb; font-weight: 300; }
.back-btn { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #888; background: none; border: none; cursor: pointer; font-family: 'IBM Plex Mono', monospace; padding: 28px 28px 0; display: block; font-weight: 300; }
.back-btn:hover { color: #111; }
.page-top { padding: 36px 28px 0; }
.page-num { font-size: 8px; letter-spacing: 4px; text-transform: uppercase; color: #aaa; margin-bottom: 18px; font-weight: 300; }
.page-title { font-size: 26px; font-weight: 300; color: #111; line-height: 1.3; font-family: 'IBM Plex Sans', sans-serif; letter-spacing: -0.3px; }
.page-title em { font-style: italic; color: #888; font-weight: 300; }
.summary-stripe { margin: 32px 28px 0; border-top: 1px solid #bbb; }
.s-row { display: flex; justify-content: space-between; align-items: baseline; padding: 12px 0; border-bottom: 1px solid #e0dbd4; }
.s-name { font-size: 13px; font-weight: 400; color: #222; font-family: 'IBM Plex Sans', sans-serif; }
.s-color { font-size: 11px; color: #aaa; margin-left: 6px; font-weight: 300; }
.s-qty { font-size: 12px; color: #666; font-weight: 400; font-family: 'IBM Plex Mono', monospace; }
.est-inline { margin: 0 28px; padding: 12px 0; border-bottom: 1px solid #e0dbd4; display: flex; justify-content: space-between; align-items: baseline; }
.est-inline-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #999; font-weight: 300; }
.est-inline-val { font-size: 12px; font-weight: 300; color: #333; font-family: 'IBM Plex Sans', sans-serif; text-align: right; }
.fields-wrap { padding: 36px 28px 0; }
.field-group { margin-bottom: 32px; }
.field-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #555; margin-bottom: 12px; display: block; font-weight: 500; }
.field-input { width: 100%; border: none; border-bottom: 1px solid #bbb; padding: 10px 0; font-family: 'IBM Plex Sans', sans-serif; font-size: 15px; font-weight: 400; color: #111; outline: none; background: transparent; transition: border-color 0.2s; -webkit-appearance: none; border-radius: 0; }
.field-input:focus { border-bottom-color: #111; }
.field-input::placeholder { color: #ccc; font-weight: 300; }
.submit-area { padding: 40px 28px 100px; }
.submit-btn { display: block; width: 100%; padding: 18px; background: #111; color: #f0ede8; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; border: none; cursor: pointer; font-weight: 400; text-align: left; transition: opacity 0.15s; }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.submit-note { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: #777; margin-top: 14px; font-weight: 400; }
.review-section { margin: 40px 28px 0; }
.review-section-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #888; margin-bottom: 0; font-weight: 500; padding-bottom: 10px; border-bottom: 1px solid #ccc; }
.r-row { display: flex; justify-content: space-between; align-items: baseline; padding: 11px 0; border-bottom: 1px solid #e8e4df; gap: 16px; }
.r-key { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: #777; font-weight: 400; flex-shrink: 0; }
.r-val { font-size: 13px; color: #111; font-weight: 400; text-align: right; line-height: 1.5; font-family: 'IBM Plex Sans', sans-serif; }
.done-page { min-height: 100vh; display: flex; flex-direction: column; padding: 32px 28px 40px; }
.done-header { display: flex; justify-content: space-between; align-items: flex-start; }
.done-brand { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; font-weight: 400; color: #111; }
.done-status { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #888; font-weight: 300; }
.done-main { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 72px 0 40px; }
.done-po-label { font-size: 8px; letter-spacing: 4px; text-transform: uppercase; color: #aaa; margin-bottom: 14px; font-weight: 300; }
.done-po-num { font-size: 48px; font-weight: 300; color: #111; letter-spacing: 4px; font-family: 'IBM Plex Sans', sans-serif; line-height: 1; }
.done-divider { width: 100%; height: 1px; background: #ccc; margin: 36px 0; }
.done-grid { display: grid; grid-template-columns: 1fr 1fr; }
.done-cell { padding: 18px 0; border-bottom: 1px solid #e0dbd4; }
.done-cell:nth-child(odd) { border-right: 1px solid #e0dbd4; padding-right: 20px; }
.done-cell:nth-child(even) { padding-left: 20px; }
.done-cell:nth-last-child(-n+2) { border-bottom: none; }
.done-cell-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #aaa; margin-bottom: 8px; font-weight: 300; }
.done-cell-val { font-size: 14px; color: #111; font-weight: 400; font-family: 'IBM Plex Sans', sans-serif; line-height: 1.4; }
.done-note { margin-top: 40px; font-size: 12px; color: #777; line-height: 1.8; font-weight: 300; font-family: 'IBM Plex Sans', sans-serif; }
.done-track-hint { margin-top: 16px; font-size: 11px; color: #aaa; line-height: 1.8; font-weight: 300; font-family: 'IBM Plex Mono', monospace; }
.done-track-link { color: #111; font-weight: 400; text-decoration: underline; }
.done-new-btn { margin-top: 40px; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: #aaa; background: none; border: none; cursor: pointer; font-family: 'IBM Plex Mono', monospace; padding: 0; text-decoration: underline; font-weight: 300; }
.done-footer { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #ccc; font-weight: 300; margin-top: 48px; }
.cart-footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(4px); width: 100%; max-width: 600px; background: #111; z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s; }
.cart-footer.visible { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
.cart-footer-inner { display: flex; align-items: center; justify-content: space-between; padding: 18px 28px; cursor: pointer; }
.cf-left { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: #888; font-weight: 300; line-height: 1.8; }
.cf-left strong { color: #fff; font-weight: 400; display: block; font-size: 11px; letter-spacing: 1px; }
.cf-btn { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #fff; background: none; border: none; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-weight: 300; padding: 0; }
.cart-panel-overlay { position: fixed; inset: 0; background: rgba(17,17,17,0.6); z-index: 15; opacity: 0; pointer-events: none; transition: opacity 0.2s; display: flex; align-items: flex-end; justify-content: center; }
.cart-panel-overlay.open { opacity: 1; pointer-events: all; }
.cart-panel { background: #f0ede8; width: 100%; max-width: 600px; max-height: 70vh; overflow-y: auto; transform: translateY(20px); opacity: 0; transition: transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.2s; pointer-events: none; }
.cart-panel.open { transform: translateY(0); opacity: 1; pointer-events: all; }
.cart-panel-top { padding: 24px 28px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #d8d4ce; }
.cart-panel-title { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #888; font-weight: 300; }
.cart-panel-close { font-size: 14px; color: #bbb; background: none; border: none; cursor: pointer; font-family: 'IBM Plex Mono', monospace; padding: 0; line-height: 1; }
.cart-item-row { display: flex; align-items: baseline; justify-content: space-between; padding: 13px 28px; border-bottom: 1px solid #e8e4df; }
.cart-item-name { font-size: 13px; font-weight: 300; color: #222; font-family: 'IBM Plex Sans', sans-serif; }
.cart-item-meta { font-size: 10px; color: #bbb; margin-left: 5px; font-weight: 300; }
.cart-item-right { display: flex; align-items: center; gap: 16px; }
.cart-item-qty { font-size: 11px; color: #888; font-weight: 300; }
.cart-item-del { font-size: 14px; color: #ccc; background: none; border: none; cursor: pointer; font-family: 'IBM Plex Mono', monospace; padding: 0; line-height: 1; }
.cart-panel-footer { padding: 16px 0 0; }
.notes-area { padding: 0 28px; border-top: 1px solid #e0dbd4; }
.notes-toggle { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; cursor: pointer; }
.notes-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #888; font-weight: 300; margin-bottom: 0; cursor: pointer; }
.notes-opt { font-size: 7px; color: #bbb; letter-spacing: 1px; }
.notes-input { width: 100%; border: none; border-bottom: 1px solid #bbb; padding: 10px 0; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; font-weight: 300; color: #111; outline: none; background: transparent; }
.cart-panel-next { display: block; width: 100%; padding: 16px 28px; background: #111; color: #f0ede8; font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 3px; text-transform: uppercase; border: none; cursor: pointer; font-weight: 300; text-align: left; margin-top: 16px; }
.dialog-overlay { position: fixed; inset: 0; background: rgba(17,17,17,0.55); z-index: 20; opacity: 0; pointer-events: none; transition: opacity 0.2s; display: flex; align-items: flex-end; justify-content: center; }
.dialog-overlay.open { opacity: 1; pointer-events: all; }
.dialog { background: #f0ede8; width: 100%; max-width: 600px; max-height: 80vh; overflow-y: auto; transform: translateY(20px); opacity: 0; transition: transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.2s; pointer-events: none; }
.dialog.open { transform: translateY(0); opacity: 1; pointer-events: all; }
.dialog-top { padding: 28px 28px 20px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #d8d4ce; }
.dialog-name { font-size: 14px; font-weight: 300; color: #111; font-family: 'IBM Plex Sans', sans-serif; }
.dialog-hint { font-size: 7px; letter-spacing: 2px; text-transform: uppercase; color: #999; margin-top: 5px; font-weight: 300; }
.dialog-close { font-size: 14px; color: #bbb; background: none; border: none; cursor: pointer; font-family: 'IBM Plex Mono', monospace; padding: 0; line-height: 1; }
.dcolor-section { border-bottom: 1px solid #e8e4df; }
.dcolor-section-header { padding: 14px 28px 10px; display: flex; justify-content: space-between; align-items: center; }
.dcolor-section-name { font-size: 12px; font-weight: 400; color: #111; font-family: 'IBM Plex Sans', sans-serif; }
.dcolor-section-est { font-size: 9px; color: #aaa; font-family: 'IBM Plex Mono', monospace; }
.dcolor-section-soldout { font-size: 9px; color: #c0392b; font-family: 'IBM Plex Mono', monospace; }
.dsize-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 28px 10px 40px; border-top: 1px solid #f0ede8; background: #f8f6f3; }
.dsize-row.soldout .dsize-label { opacity: 0.4; }
.dsize-row.soldout .qty-btn { opacity: 0.3; pointer-events: none; }
.dsize-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #555; font-family: 'IBM Plex Mono', monospace; font-weight: 300; min-width: 48px; }
.dsize-sisa { font-size: 9px; color: #bbb; font-family: 'IBM Plex Mono', monospace; }
.dsize-sisa.low { color: #c8a04a; }
.dsize-sisa.zero { color: #c0392b; }
.dcolor-row { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; border-bottom: 1px solid #e8e4df; }
.dcolor-name { font-size: 11px; letter-spacing: 1px; font-weight: 300; color: #333; font-family: 'IBM Plex Sans', sans-serif; }
.est-batch-note { font-size: 9px; color: #aaa; font-family: 'IBM Plex Mono', monospace; margin-top: 4px; }
.qty-ctrl { display: flex; align-items: center; gap: 20px; }
.qty-btn { width: 24px; height: 24px; border: 1px solid #ccc; background: transparent; cursor: pointer; font-size: 14px; color: #666; display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; line-height: 1; transition: all 0.15s; }
.qty-btn:hover { border-color: #111; color: #111; }
.qty-num { font-size: 12px; min-width: 20px; text-align: center; color: #111; font-weight: 300; }
.dialog-next { display: block; width: 100%; padding: 18px 28px; background: #111; color: #f0ede8; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; border: none; cursor: pointer; font-weight: 300; text-align: left; }
</style>

<body>

<!-- Channel picker screen -->
<div id="channel-screen" class="channel-screen">
  <div class="channel-brand">jedda</div>
  <div id="channel-picker-content">
    <div class="channel-label">pilih lokasi</div>
    <div class="channel-buttons" id="channel-top-buttons">
      <div style="font-size:9px;color:#bbb;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;text-align:center">memuat...</div>
    </div>
  </div>
</div>

<!-- PIN screen -->
<div id="pin-screen" class="pin-screen" style="display:none" onclick="document.getElementById('pin-hidden').focus()">
  <div class="pin-brand">jedda</div>
  <div class="pin-channel" id="pin-channel-label">—</div>
  <div class="pin-label">masukkan PIN</div>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-error" id="pin-error">PIN salah</div>
  <div class="pin-keypad">
    <div class="pin-key" onclick="pinPress('1')">1</div><div class="pin-key" onclick="pinPress('2')">2</div><div class="pin-key" onclick="pinPress('3')">3</div>
    <div class="pin-key" onclick="pinPress('4')">4</div><div class="pin-key" onclick="pinPress('5')">5</div><div class="pin-key" onclick="pinPress('6')">6</div>
    <div class="pin-key" onclick="pinPress('7')">7</div><div class="pin-key" onclick="pinPress('8')">8</div><div class="pin-key" onclick="pinPress('9')">9</div>
    <div class="pin-key empty"></div><div class="pin-key" onclick="pinPress('0')">0</div><div class="pin-key del" onclick="pinDel()">del</div>
  </div>
  <input id="pin-hidden" inputmode="numeric" pattern="[0-9]*" maxlength="4"
    style="position:absolute;opacity:0;width:1px;height:1px;pointer-events:none;" autocomplete="off">
  <button class="pin-back" onclick="backToChannelPicker()">← kembali</button>
</div>

<div id="root"></div>

<div id="cart-panel-overlay" class="cart-panel-overlay" onclick="closeCartPanel()">
  <div id="cart-panel-el" class="cart-panel" onclick="event.stopPropagation()">
    <div class="cart-panel-top">
      <span class="cart-panel-title">item dipilih</span>
      <button class="cart-panel-close" onclick="closeCartPanel()">×</button>
    </div>
    <div id="cart-panel-list"></div>
    <div class="cart-panel-footer">
      <div class="notes-area">
        <div class="notes-toggle" onclick="toggleNotes()" id="notes-toggle">
          <span class="notes-label">notes <span class="notes-opt">(opsional)</span></span>
          <span id="notes-arrow" style="font-size:8px;color:#bbb;font-family:'IBM Plex Mono',monospace">+</span>
        </div>
        <div id="notes-collapse" style="overflow:hidden;max-height:0;transition:max-height 0.2s ease;">
          <input class="notes-input" placeholder="permintaan khusus, packaging, dll." id="cart-notes-input" oninput="st.notes=this.value" style="margin-bottom:14px;">
        </div>
      </div>
      <button class="cart-panel-next" onclick="closeCartPanel();st.phase='customer';render()">lanjut →</button>
    </div>
  </div>
</div>

<div id="dialog-overlay" class="dialog-overlay" onclick="closeSheet()">
  <div id="dialog-el" class="dialog" onclick="event.stopPropagation()">
    <div class="dialog-top">
      <div>
        <div id="dialog-title" class="dialog-name"></div>
        <div class="dialog-hint">pilih warna & ukuran</div>
      </div>
      <button class="dialog-close" onclick="closeSheet()">×</button>
    </div>
    <div id="dialog-colors"></div>
    <button class="dialog-next" onclick="proceedFromDialog()">lanjut →</button>
  </div>
</div>

<script>
const SB_URL = "https://okgcujdlwkcwvsdybkza.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rZ2N1amRsd2tjd3ZzZHlia3phIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MzU2MzcsImV4cCI6MjA5NTIxMTYzN30.Zu6MzG4cXl9MUMcbAWV3U6wJ1SwM3Vzis4pu0UKFziM";
const _supabase = supabase.createClient(SB_URL, SB_KEY);

// ── state ──
let channels = [];
let selectedChannel = null; // channel object yg dipilih
let PRODUCTS = []; // loaded from DB
let pinBuffer = '';

let slotData = {};
let batchLoaded = false;
let articleEstDays = {};

const st = { phase:"items", cart:{}, activeSheet:null, name:"", phone:"", address:"", notes:"", orderNum:null, savedEstDate:null };

// ── init: load channels dulu ──
document.addEventListener('DOMContentLoaded', async () => {
  const { data } = await _supabase.from('po_channels').select('*').order('type').order('created_at');
  channels = (data || []).filter(c => c.is_active);
  renderChannelPicker(false);
});

// ── channel picker ──
function renderChannelPicker(showEventList) {
  const btns = document.getElementById('channel-top-buttons');
  const label = document.getElementById('channel-picker-content').querySelector('.channel-label');
  if(!showEventList) {
    // Top level: Jedda Studio vs Event
    label.textContent = 'pilih lokasi';
    const toko = channels.find(c => c.type === 'toko');
    const events = channels.filter(c => c.type === 'event');
    let html = '';
    if(toko) html += `<button class="channel-btn" onclick="selectChannel('${toko.id}')">${toko.name}</button>`;
    if(events.length) html += `<button class="channel-btn" onclick="renderChannelPicker(true)">Event →</button>`;
    btns.innerHTML = html || '<div style="font-size:9px;color:#bbb;font-family:IBM Plex Mono,monospace">tidak ada channel aktif.</div>';
  } else {
    // Event sub-list
    label.textContent = 'pilih event';
    const events = channels.filter(c => c.type === 'event');
    let html = events.map(e => `<button class="channel-btn" onclick="selectChannel('${e.id}')">${e.name}</button>`).join('');
    html += `<button class="channel-btn" style="color:#aaa;border-color:#e0dbd4" onclick="renderChannelPicker(false)">← kembali</button>`;
    btns.innerHTML = html;
  }
}

function selectChannel(chId) {
  selectedChannel = channels.find(c => c.id === chId);
  if(!selectedChannel) return;
  // tampilkan PIN screen
  document.getElementById('channel-screen').style.display = 'none';
  const pinScreen = document.getElementById('pin-screen');
  pinScreen.style.display = 'flex';
  document.getElementById('pin-channel-label').textContent = selectedChannel.name;
  pinBuffer = '';
  updatePinDots();
  setTimeout(() => document.getElementById('pin-hidden')?.focus(), 100);
}

function backToChannelPicker() {
  selectedChannel = null;
  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('channel-screen').style.display = 'flex';
  renderChannelPicker(false);
}

// ── PIN ──
function pinPress(d) { if(pinBuffer.length>=4) return; pinBuffer+=d; updatePinDots(); syncPin(); if(pinBuffer.length===4) setTimeout(checkPin,100); }
function pinDel() { pinBuffer=pinBuffer.slice(0,-1); updatePinDots(); syncPin(); }
function syncPin() { const el=document.getElementById('pin-hidden'); if(el) el.value=pinBuffer; }
function updatePinDots() { for(let i=0;i<4;i++) document.getElementById('pd'+i).classList.toggle('filled',i<pinBuffer.length); }
function checkPin() {
  if(pinBuffer === selectedChannel?.pin) {
    document.getElementById('pin-screen').style.display = 'none';
    loadAndRender();
  } else {
    document.getElementById('pin-error').classList.add('show');
    pinBuffer=''; updatePinDots(); syncPin();
    setTimeout(()=>document.getElementById('pin-error').classList.remove('show'),1500);
  }
}
document.addEventListener('DOMContentLoaded', () => {
  const h=document.getElementById('pin-hidden'); if(!h) return;
  h.addEventListener('input',()=>{ const v=h.value.replace(/\D/g,'').slice(0,4); h.value=v; pinBuffer=v; updatePinDots(); if(pinBuffer.length===4) setTimeout(checkPin,100); });
  h.addEventListener('keydown',e=>{ if(e.key==='Backspace'&&pinBuffer.length>0){ pinBuffer=pinBuffer.slice(0,-1); updatePinDots(); } });
});

// ── load data setelah PIN unlock ──
async function loadAndRender() {
  await loadProducts();
  await loadBatchSlots();
  render();
}

async function loadProducts() {
  const { data } = await _supabase.from('po_products').select('*').eq('is_active', true).order('sort_order');
  PRODUCTS = (data || []).map(p => ({
    name: p.name,
    colors: p.colors || [],
    sizes: p.sizes || null
  }));
}

async function loadBatchSlots() {
  try {
    const today = new Date().toISOString().slice(0,10);
    const chId = selectedChannel?.id;
    const [
      { data: batches },
      { data: activeOrders },
      { data: items },
      { data: settings }
    ] = await Promise.all([
      _supabase.from('po_batches').select('*').eq('channel', chId).gte('ends_at', today).order('ends_at', {ascending:true}),
      _supabase.from('po_orders').select('id').eq('channel', chId).in('status', ['baru','tunggu_ongkir','diproses']),
      _supabase.from('po_items').select('article, color, size, qty, order_id'),
      _supabase.from('po_settings').select('channel_est_days').eq('id', 1).single()
    ]);
    // ambil est days untuk channel ini
    const allDays = settings?.channel_est_days || {};
    articleEstDays = allDays[chId] || {};
    const activeIds = new Set((activeOrders||[]).map(o => o.id));
    const usedMap = {};
    (items||[]).filter(i => activeIds.has(i.order_id)).forEach(i => {
      const sz = i.size || 'OS';
      const key = i.article + ' · ' + i.color + ' · ' + sz;
      usedMap[key] = (usedMap[key] || 0) + i.qty;
    });
    slotData = {};
    (batches||[]).forEach(b => {
      const slots = b.slots || {};
      Object.keys(slots).forEach(key => {
        if(slotData[key] && slotData[key].remaining > 0) return;
        const total = slots[key] || 0;
        const used = usedMap[key] || 0;
        const remaining = total - used;
        slotData[key] = { total, used, remaining, endsAt: b.ends_at };
      });
    });
  } catch(e) { console.warn('batch load failed', e); }
  batchLoaded = true;
}

// ── slot helpers ──
function slotKey(a,c,s){ return a+' · '+c+' · '+(s||'OS'); }
function getSlot(a,c,s){ return slotData[slotKey(a,c,s)]||null; }
function isSoldout(a,c,s){ if(!batchLoaded) return false; const sl=getSlot(a,c,s); return sl?sl.remaining<=0:false; }
function isArticleDisabled(n){ if(!batchLoaded) return false; const p=PRODUCTS.find(x=>x.name===n); if(!p) return false; const sz=p.sizes||['OS']; return p.colors.every(c=>{ const hasBatch=sz.some(s=>getSlot(n,c,s)); if(hasBatch) return false; return (articleEstDays[n+' · '+c]||0)<=0; }); }
function isColorDisabled(n,c){ if(!batchLoaded) return false; const p=PRODUCTS.find(x=>x.name===n); if(!p) return false; const sz=p.sizes||['OS']; const hasBatch=sz.some(s=>getSlot(n,c,s)); if(hasBatch) return false; return (articleEstDays[n+' · '+c]||0)<=0; }
function isArticleSoldout(n){ const p=PRODUCTS.find(x=>x.name===n); if(!p) return false; const sz=p.sizes||['OS']; return p.colors.every(c=>sz.every(s=>isSoldout(n,c,s))); }
function daysUntil(endsAt){ if(!endsAt) return null; const diff=new Date(endsAt+'T00:00:00')-new Date(new Date().toDateString()); return Math.ceil(diff/86400000); }
function getCartEndsAt(){ let l=null; cartItems().forEach(i=>{ const sl=getSlot(i.name,i.color,i.size); if(sl&&sl.endsAt){ if(!l||sl.endsAt>l) l=sl.endsAt; } }); return l; }
function getArticleEstDays(n,c){ return articleEstDays[n+' · '+c]||0; }
function estDisplay(){ const items=cartItems(); if(!items.length) return '—'; const maxD=Math.max(...items.map(i=>{ const sl=getSlot(i.name,i.color,i.size); if(sl&&sl.endsAt) return daysUntil(sl.endsAt)||0; return getArticleEstDays(i.name,i.color)||0; })); return maxD>0?'±'+maxD+' hari':'—'; }

// ── cart helpers ──
function k(n,c,s){ return n+"||"+c+"||"+(s||'OS'); }
function getQty(n,c,s){ return st.cart[k(n,c,s)]||0; }
function setQty(n,c,s,v){ const key=k(n,c,s); if(v<=0) delete st.cart[key]; else st.cart[key]=Math.max(0,v); updateItemCard(n); updateCartFooter(); const el=document.getElementById('dq-'+esc(n+c+(s||'OS'))); if(el) el.textContent=getQty(n,c,s)||'—'; }
function totalQty(){ return Object.values(st.cart).reduce((a,b)=>a+b,0); }
function cartItems(){ return Object.entries(st.cart).filter(([,q])=>q>0).map(([key,q])=>{ const [n,c,s]=key.split("||"); return {name:n,color:c,size:s==='OS'?null:s,qty:q}; }); }
function itemTotalQty(n){ return Object.entries(st.cart).filter(([key,q])=>key.startsWith(n+"||")&&q>0).reduce((a,[,q])=>a+q,0); }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;"); }

// ── dialog ──
function openSheet(name){
  st.activeSheet=name;
  const p=PRODUCTS.find(x=>x.name===name);
  document.getElementById("dialog-title").textContent=p.name;
  renderDialogColors(p);
  document.getElementById("dialog-overlay").classList.add("open");
  document.getElementById("dialog-el").classList.add("open");
}
function closeSheet(){ document.getElementById("dialog-overlay").classList.remove("open"); document.getElementById("dialog-el").classList.remove("open"); st.activeSheet=null; updateCartFooter(); }
function proceedFromDialog(){ closeSheet(); updateCartFooter(); }

function renderDialogColors(p){
  const isOneSize=!p.sizes;
  if(isOneSize){
    document.getElementById("dialog-colors").innerHTML=p.colors.map(col=>{
      const q=getQty(p.name,col,'OS'); const sl=getSlot(p.name,col,'OS'); const soldout=isSoldout(p.name,col,'OS'); const cd=isColorDisabled(p.name,col);
      const estNote=sl&&sl.endsAt&&!soldout?`<span class="est-batch-note">est. ±${daysUntil(sl.endsAt)} hari</span>`:(cd?`<span class="est-batch-note" style="color:#ccc">po blm dibuka</span>`:'');
      return `<div class="dcolor-row${soldout||cd?' soldout':''}"><div><span class="dcolor-name" style="${cd?'color:#ccc':''}">${col}</span>${estNote}</div><div class="qty-ctrl"><button class="qty-btn" onclick="setQty('${esc(p.name)}','${col}','OS',${q}-1)" ${soldout||cd?'disabled':''}>−</button><span class="qty-num" id="dq-${esc(p.name+col+'OS')}">${q||'—'}</span><button class="qty-btn" onclick="setQty('${esc(p.name)}','${col}','OS',${q}+1)" ${soldout||cd?'disabled':''}>+</button></div></div>`;
    }).join('');
    return;
  }
  document.getElementById("dialog-colors").innerHTML=p.colors.map(col=>{
    const cd=isColorDisabled(p.name,col);
    let colorEst=null;
    p.sizes.forEach(sz=>{ const sl=getSlot(p.name,col,sz); if(sl&&sl.endsAt){if(!colorEst||sl.endsAt<colorEst)colorEst=sl.endsAt;} });
    const allSo=p.sizes.every(sz=>isSoldout(p.name,col,sz));
    const estLabel=cd?`<span class="dcolor-section-est" style="color:#ccc">po blm dibuka</span>`:colorEst&&!allSo?`<span class="dcolor-section-est">est. ±${daysUntil(colorEst)} hari</span>`:(allSo?`<span class="dcolor-section-soldout">habis</span>`:'');
    const sizeRows=p.sizes.map(sz=>{
      const q=getQty(p.name,col,sz); const soldout=isSoldout(p.name,col,sz)||cd; const sl=getSlot(p.name,col,sz);
      let sisaLabel=''; if(sl){const rem=sl.remaining,pct=sl.total>0?rem/sl.total:1; if(rem<=0)sisaLabel=`<span class="dsize-sisa zero">habis</span>`; else if(pct<0.2)sisaLabel=`<span class="dsize-sisa low">${rem} sisa</span>`; else sisaLabel=`<span class="dsize-sisa">${rem} sisa</span>`;}
      const sn=p.name.replace(/'/g,"\\'"),ssz=sz.replace(/'/g,"\\'");
      return `<div class="dsize-row${soldout?' soldout':''}"><span class="dsize-label">${sz}</span>${sisaLabel}<div class="qty-ctrl"><button class="qty-btn" onclick="setQty('${sn}','${col}','${ssz}',${q}-1)" ${soldout?'disabled':''}>−</button><span class="qty-num" id="dq-${esc(p.name+col+sz)}">${q||'—'}</span><button class="qty-btn" onclick="setQty('${sn}','${col}','${ssz}',${q}+1)" ${soldout?'disabled':''}>+</button></div></div>`;
    }).join('');
    return `<div class="dcolor-section" style="${cd?'opacity:0.4':''}"><div class="dcolor-section-header"><span class="dcolor-section-name">${col}</span>${estLabel}</div>${sizeRows}</div>`;
  }).join('');
}

function updateItemCard(n){
  const el=document.getElementById('ic-'+esc(n)); if(!el) return;
  const tq=itemTotalQty(n); el.classList.toggle('has-qty',tq>0);
  const badge=el.querySelector('.item-card-badge'); if(badge){ if(tq>0){badge.textContent=tq;badge.style.display='flex';}else badge.style.display='none'; }
}
function updateCartFooter(){
  const el=document.getElementById('cart-footer'); if(!el) return;
  el.classList.toggle('visible',totalQty()>0);
  const left=el.querySelector('.cf-left'); if(left) left.innerHTML=`<strong>${totalQty()} item</strong>est. ${estDisplay()}`;
}

function openCartPanel(){ renderCartPanel(); document.getElementById("cart-panel-overlay").classList.add("open"); document.getElementById("cart-panel-el").classList.add("open"); const ni=document.getElementById('cart-notes-input'); if(ni) ni.value=st.notes; }
function closeCartPanel(){ document.getElementById("cart-panel-overlay").classList.remove("open"); document.getElementById("cart-panel-el").classList.remove("open"); }
function renderCartPanel(){
  const items=cartItems();
  document.getElementById("cart-panel-list").innerHTML=items.map(i=>{ const meta=[i.color,i.size].filter(Boolean).join(' · '); const ck=k(i.name,i.color,i.size||'OS'); return `<div class="cart-item-row"><span class="cart-item-name">${esc(i.name)}<span class="cart-item-meta"> / ${meta}</span></span><div class="cart-item-right"><span class="cart-item-qty">${i.qty} pcs</span><button class="cart-item-del" onclick="deleteCartItem('${ck}')">×</button></div></div>`; }).join("");
}
function deleteCartItem(ck){ delete st.cart[ck]; const parts=ck.split("||"); updateItemCard(parts[0]); updateCartFooter(); renderCartPanel(); if(totalQty()===0) closeCartPanel(); }
function toggleNotes(){ const c=document.getElementById('notes-collapse'),a=document.getElementById('notes-arrow'); const isOpen=c.style.maxHeight!=='0px'&&c.style.maxHeight!==''; if(isOpen){c.style.maxHeight='0';a.textContent='+';}else{c.style.maxHeight='60px';a.textContent='−';setTimeout(()=>{const ni=document.getElementById('cart-notes-input');if(ni)ni.focus();},220);} }

// ── render ──
function render(){
  const root=document.getElementById("root");
  const items=cartItems();
  const chName=selectedChannel?.name||'Jedda';

  if(st.phase==="done"){
    root.innerHTML=`<div class="done-page"><div class="done-header"><div class="done-brand">Jedda</div><div class="done-status">order received</div></div><div class="done-main"><div class="done-po-label">nomor pesanan</div><div class="done-po-num">${st.orderNum}</div><div class="done-divider"></div><div class="done-grid"><div class="done-cell"><div class="done-cell-label">estimasi PO</div><div class="done-cell-val">${st.savedEstDate||'—'}</div></div><div class="done-cell"><div class="done-cell-label">status</div><div class="done-cell-val">sedang diproses</div></div><div class="done-cell"><div class="done-cell-label">nama</div><div class="done-cell-val">${esc(st.name)}</div></div><div class="done-cell"><div class="done-cell-label">kontak</div><div class="done-cell-val">${esc(st.phone)}</div></div></div><div class="done-note">konfirmasi pesanan akan dikirim via whatsapp dalam 2x24 jam.</div><div class="done-track-hint">pantau status pesanan di<br><a class="done-track-link" href="https://po.jeddawear.com/track?id=${st.orderNum}" target="_blank">po.jeddawear.com/track</a></div><button class="done-new-btn" onclick="resetAll()">+ order baru</button></div><div class="done-footer">jedda — ${new Date().getFullYear()}</div></div>`;
    return;
  }

  if(st.phase==="review"){
    const irows=items.map(i=>{ const m=[i.color,i.size].filter(Boolean).join(' · '); return `<div class="r-row"><span class="r-key">${esc(i.name)}</span><span class="r-val">${m} · ${i.qty} pcs</span></div>`; }).join("");
    root.innerHTML=`<div class="header"><div class="header-brand">Jedda</div><div class="header-meta">pre-order<br>${new Date().toLocaleDateString("id-ID",{month:"long",year:"numeric"})}</div></div><hr class="header-rule"><button class="back-btn" onclick="st.phase='customer';render()">← kembali</button><div class="page-top"><div class="page-num">03 — konfirmasi</div><div class="page-title"><em>konfirmasi</em> pesanan.</div></div><div class="review-section"><div class="review-section-label">item</div><div class="review-rows">${irows}</div></div><div class="review-section"><div class="review-section-label">customer</div><div class="review-rows"><div class="r-row"><span class="r-key">nama</span><span class="r-val">${esc(st.name)}</span></div><div class="r-row"><span class="r-key">hp</span><span class="r-val">${esc(st.phone)}</span></div><div class="r-row"><span class="r-key">alamat</span><span class="r-val">${esc(st.address)}</span></div>${st.notes?`<div class="r-row"><span class="r-key">catatan</span><span class="r-val">${esc(st.notes)}</span></div>`:""}</div></div><div class="review-section"><div class="review-section-label">estimasi</div><div class="review-rows"><div class="r-row"><span class="r-key">estimasi PO</span><span class="r-val">${estDisplay()}</span></div></div></div><div class="submit-area"><button class="submit-btn" id="submit-btn" onclick="submitOrder()">confirm order →</button><div class="submit-note">tim jedda akan menghubungi via whatsapp dalam 2x24 jam</div></div>`;
    return;
  }

  if(st.phase==="customer"){
    const srows=items.map(i=>{ const m=[i.color,i.size].filter(Boolean).join(' · '); return `<div class="s-row"><span class="s-name">${esc(i.name)}<span class="s-color">/ ${m}</span></span><span class="s-qty">${i.qty}</span></div>`; }).join("");
    root.innerHTML=`<div class="header"><div class="header-brand">Jedda</div><div class="header-meta">pre-order<br>data customer</div></div><hr class="header-rule"><button class="back-btn" onclick="st.phase='items';render()">← kembali</button><div class="page-top"><div class="page-num">02 — data customer</div><div class="page-title"><em>lengkapi</em> pesanan.</div></div><div class="summary-stripe">${srows}</div><div class="est-inline"><span class="est-inline-label">estimasi PO</span><span class="est-inline-val">${estDisplay()}</span></div><div class="fields-wrap"><div class="field-group"><label class="field-label">nama lengkap</label><input class="field-input" id="f-name" placeholder="nama sesuai penerima" value="${esc(st.name)}" oninput="st.name=this.value"></div><div class="field-group"><label class="field-label">nomor HP</label><input class="field-input" id="f-phone" placeholder="08xx" type="tel" value="${esc(st.phone)}" oninput="st.phone=this.value"></div><div class="field-group"><label class="field-label">alamat lengkap</label><input class="field-input" id="f-addr" placeholder="jalan, kelurahan, kota, kode pos" value="${esc(st.address)}" oninput="st.address=this.value"></div></div><div class="submit-area"><button class="submit-btn" onclick="goReview()">lanjut →</button></div>`;
    return;
  }

  // items
  if(!batchLoaded){ root.innerHTML=`<div class="header"><div class="header-brand">Jedda</div><div class="header-meta">pre-order<br>${new Date().toLocaleDateString("id-ID",{month:"long",year:"numeric"})}</div></div><hr class="header-rule"><div class="loading-bar">memuat...</div>`; return; }
  const cards=PRODUCTS.map(p=>{
    const tq=itemTotalQty(p.name); const disabled=isArticleDisabled(p.name); const soldout=!disabled&&isArticleSoldout(p.name);
    const safeName=p.name.replace(/'/g,"\\'");
    const cc=['item-card',tq>0?'has-qty':'',disabled?'disabled':'',soldout?'soldout':''].filter(Boolean).join(' ');
    const oc=disabled||soldout?'':`onclick="openSheet('${safeName}')"`;
    const subtitle = disabled
      ? '<span style="color:#c0392b;font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:300">po blm dibuka</span>'
      : soldout
      ? '<span style="color:#c0392b;font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:300">habis</span>'
      : `<div class="item-card-colors">${p.colors.join(" · ")}</div>`;
    return `<div class="${cc}" id="ic-${esc(p.name)}" ${oc}><div class="item-card-name">${p.name}</div>${subtitle}${tq>0?`<div class="item-card-badge" onclick="event.stopPropagation();openSheet('${safeName}')">${tq}</div>`:""}</div>`;
  }).join("");
  root.innerHTML=`<div class="header"><div class="header-brand">Jedda</div><div class="header-meta">pre-order<br>${new Date().toLocaleDateString("id-ID",{month:"long",year:"numeric"})}</div></div><hr class="header-rule"><div class="items-eyebrow"><span class="eyebrow-left">01 — pilih item</span><span class="eyebrow-right">${totalQty()>0?totalQty()+" dipilih":"—"}</span></div><div class="cat-block"><div class="item-grid">${cards}</div></div><div style="height:100px"></div><div id="cart-footer" class="cart-footer ${totalQty()>0?'visible':''}"><div class="cart-footer-inner" onclick="openCartPanel()"><div class="cf-left"><strong>${totalQty()} item</strong>est. ${estDisplay()}</div><button class="cf-btn" onclick="event.stopPropagation();openCartPanel()">lihat →</button></div></div>`;
}

function goReview(){ if(!st.name.trim()){alert("nama wajib diisi.");return;} if(!st.phone.trim()){alert("nomor HP wajib diisi.");return;} const ph=st.phone.replace(/\D/g,""); if(ph.length<8){alert("nomor HP tidak valid.");return;} if(!st.address.trim()){alert("alamat wajib diisi.");return;} st.phase="review"; render(); }

async function submitOrder(){
  const btn=document.getElementById('submit-btn');
  if(btn){btn.disabled=true;btn.textContent="memproses...";}
  try {
    let nextNum=1;
    try{ const {data:last}=await _supabase.from("po_orders").select("po_number").order("id",{ascending:false}).limit(1); if(last&&last.length>0){const n=parseInt(last[0].po_number.replace("JD-","")); if(!isNaN(n)) nextNum=n+1;} }catch(e){}
    const poNumber="JD-"+String(nextNum).padStart(4,"0");
    const cartSnapshot=cartItems();
    const maxEst=Math.max(...cartSnapshot.map(i=>{ const sl=getSlot(i.name,i.color,i.size); if(sl&&sl.endsAt) return daysUntil(sl.endsAt)||0; return getArticleEstDays(i.name,i.color)||0; }),0);
    const estDateRaw=getCartEndsAt();
    const md=estDateRaw?0:maxEst;
    const {data:order,error:oe}=await _supabase.from("po_orders").insert({
      po_number:poNumber, customer_name:st.name.trim(), customer_phone:st.phone.trim(),
      customer_city:"", address:st.address.trim(), notes:st.notes.trim()||null,
      status:"baru", estimated_days:md, est_date:estDateRaw,
      channel: selectedChannel?.id || 'jedda-studio'
    }).select().single();
    if(oe) throw oe;
    const {error:ie}=await _supabase.from("po_items").insert(cartSnapshot.map(i=>({order_id:order.id,article:i.name,color:i.color,size:i.size||null,qty:i.qty})));
    if(ie) throw ie;
    st.savedEstDate=maxEst>0?'±'+maxEst+' hari':'—';
    st.orderNum=poNumber; st.phase="done"; render();
  } catch(err){
    let msg="unknown error";
    if(typeof err==="string") msg=err;
    else if(err?.message) msg=err.message;
    else if(err?.code) msg=`code: ${err.code}`;
    else { try{msg=JSON.stringify(err);}catch(e){} }
    alert("Gagal submit:\n\n"+msg);
    if(btn){btn.disabled=false;btn.textContent="confirm order →";}
  }
}

function resetAll(){ st.phase="items"; st.cart={}; st.activeSheet=null; st.name=""; st.phone=""; st.address=""; st.notes=""; st.orderNum=null; st.savedEstDate=null; render(); }
</script>
</body>
