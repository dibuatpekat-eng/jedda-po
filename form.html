<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jedda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #f0ede8; }
body { font-family: 'IBM Plex Mono', monospace; -webkit-font-smoothing: antialiased; color: #111; min-height: 100vh; background: #f0ede8; }

#root { max-width: 600px; margin: 0 auto; min-height: 100vh; position: relative; }

/* ── header ── */
.header { display: flex; justify-content: space-between; align-items: flex-start; padding: 32px 28px 0; }
.header-brand { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; font-weight: 400; color: #111; }
.header-meta { text-align: right; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #888; line-height: 1.9; font-weight: 300; }

/* ── static rule ── */
.header-rule { margin: 24px 0 0; border: none; border-top: 1px solid #ccc; }

/* ── eyebrow ── */
.items-eyebrow { padding: 0 28px; margin-top: 40px; display: flex; justify-content: space-between; align-items: baseline; }
.eyebrow-left { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: #666; font-weight: 400; }
.eyebrow-right { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: #999; font-weight: 300; }

/* ── category ── */
.cat-block { padding: 0 28px; margin-top: 32px; }
.cat-label { font-size: 8px; letter-spacing: 4px; text-transform: uppercase; color: #aaa; margin-bottom: 12px; font-weight: 300; }

/* ── item grid (2 col boxes) ── */
.item-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.item-card { border: 1px solid #d8d4ce; padding: 16px 14px 14px; cursor: pointer; position: relative; user-select: none; background: #f0ede8; transition: border-color 0.15s, background 0.15s; }
.item-card:active { opacity: 0.6; }
.item-card.has-qty { border-color: #111; background: #111; }
.item-card-name { font-size: 13px; font-weight: 400; color: #222; line-height: 1.3; margin-bottom: 7px; font-family: 'IBM Plex Sans', sans-serif; transition: color 0.15s; }
.item-card.has-qty .item-card-name { color: #f0ede8; }
.item-card-colors { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: #aaa; font-weight: 300; transition: color 0.15s; }
.item-card.has-qty .item-card-colors { color: #888; }
.item-card-badge { position: absolute; top: 10px; right: 10px; background: #f0ede8; color: #111; font-size: 10px; font-weight: 400; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; }

/* ── notes area ── */
.notes-area { padding: 28px 28px 0; border-top: 1px solid #e0dbd4; margin-top: 28px; }
.notes-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #888; font-weight: 300; margin-bottom: 12px; display: block; }
.notes-opt { font-size: 7px; color: #bbb; letter-spacing: 1px; }
.notes-input { width: 100%; border: none; border-bottom: 1px solid #bbb; padding: 10px 0; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; font-weight: 300; color: #111; outline: none; background: transparent; transition: border-color 0.2s; }
.notes-input:focus { border-bottom-color: #111; }
.notes-input::placeholder { color: #ccc; font-weight: 300; }

/* ── cart footer ── */
.cart-footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(4px); width: 100%; max-width: 600px; background: #111; z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s; }
.cart-footer.visible { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }
.cart-footer-inner { display: flex; align-items: center; justify-content: space-between; padding: 18px 28px; cursor: pointer; }
.cf-left { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: #888; font-weight: 300; line-height: 1.8; }
.cf-left strong { color: #fff; font-weight: 400; display: block; font-size: 11px; letter-spacing: 1px; }
.cf-btn { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #fff; background: none; border: none; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-weight: 300; padding: 0; }

/* ── cart panel ── */
.cart-panel-overlay { position: fixed; inset: 0; background: rgba(17,17,17,0.6); z-index: 15; opacity: 0; pointer-events: none; transition: opacity 0.2s; display: flex; align-items: flex-end; justify-content: center; }
.cart-panel-overlay.open { opacity: 1; pointer-events: all; }
.cart-panel { background: #f0ede8; width: 100%; max-width: 600px; max-height: 70vh; overflow-y: auto; transform: translateY(20px); opacity: 0; transition: transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.2s; pointer-events: none; }
.cart-panel.open { transform: translateY(0); opacity: 1; pointer-events: all; }
.cart-panel-top { padding: 24px 28px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #d8d4ce; }
.cart-panel-title { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #888; font-weight: 300; }
.cart-panel-close { font-size: 14px; color: #bbb; background: none; border: none; cursor: pointer; font-family: 'IBM Plex Mono', monospace; padding: 0; line-height: 1; }
.cart-panel-close:hover { color: #111; }
.cart-item-row { display: flex; align-items: baseline; justify-content: space-between; padding: 13px 28px; border-bottom: 1px solid #e8e4df; }
.cart-item-name { font-size: 13px; font-weight: 300; color: #222; font-family: 'IBM Plex Sans', sans-serif; }
.cart-item-meta { font-size: 10px; color: #bbb; margin-left: 5px; font-weight: 300; }
.cart-item-right { display: flex; align-items: center; gap: 16px; }
.cart-item-qty { font-size: 11px; color: #888; font-weight: 300; }
.cart-item-del { font-size: 14px; color: #ccc; background: none; border: none; cursor: pointer; font-family: 'IBM Plex Mono', monospace; padding: 0; line-height: 1; transition: color 0.15s; }
.cart-item-del:hover { color: #111; }
.cart-panel-footer { padding: 16px 0 0; }
.notes-toggle { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; cursor: pointer; }
.notes-toggle:hover .notes-label { color: #555; }
.cart-panel-next { display: block; width: 100%; padding: 16px 28px; background: #111; color: #f0ede8; font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 3px; text-transform: uppercase; border: none; cursor: pointer; font-weight: 300; text-align: left; margin-top: 16px; }

/* ── dialog ── */
.dialog-overlay { position: fixed; inset: 0; background: rgba(17,17,17,0.55); z-index: 20; opacity: 0; pointer-events: none; transition: opacity 0.2s; display: flex; align-items: flex-end; justify-content: center; }
.dialog-overlay.open { opacity: 1; pointer-events: all; }
.dialog { background: #f0ede8; width: 100%; max-width: 600px; max-height: 80vh; overflow-y: auto; transform: translateY(20px); opacity: 0; transition: transform 0.3s cubic-bezier(.4,0,.2,1), opacity 0.2s; pointer-events: none; }
.dialog.open { transform: translateY(0); opacity: 1; pointer-events: all; }
.dialog-top { padding: 28px 28px 20px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #d8d4ce; }
.dialog-name { font-size: 14px; font-weight: 300; color: #111; font-family: 'IBM Plex Sans', sans-serif; }
.dialog-hint { font-size: 7px; letter-spacing: 2px; text-transform: uppercase; color: #999; margin-top: 5px; font-weight: 300; }
.dialog-close { font-size: 14px; color: #bbb; background: none; border: none; cursor: pointer; font-family: 'IBM Plex Mono', monospace; padding: 0; line-height: 1; }
.dialog-close:hover { color: #111; }

/* ── dialog: color section header ── */
.dcolor-section { border-bottom: 1px solid #e8e4df; }
.dcolor-section-header { padding: 14px 28px 10px; display: flex; justify-content: space-between; align-items: center; }
.dcolor-section-name { font-size: 12px; font-weight: 400; color: #111; font-family: 'IBM Plex Sans', sans-serif; }
.dcolor-section-est { font-size: 9px; color: #aaa; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.5px; }
.dcolor-section-soldout { font-size: 9px; color: #c0392b; font-family: 'IBM Plex Mono', monospace; }

/* ── dialog: size rows inside color section ── */
.dsize-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 28px 10px 40px; border-top: 1px solid #f0ede8; background: #f8f6f3; }
.dsize-row:first-child { border-top: none; }
.dsize-row.soldout .dsize-label { opacity: 0.4; }
.dsize-row.soldout .qty-btn { opacity: 0.3; pointer-events: none; }
.dsize-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #555; font-family: 'IBM Plex Mono', monospace; font-weight: 300; min-width: 48px; }
.dsize-sisa { font-size: 9px; color: #bbb; font-family: 'IBM Plex Mono', monospace; }
.dsize-sisa.low { color: #c8a04a; }
.dsize-sisa.zero { color: #c0392b; }

/* one size variant — same as old dcolor-row */
.dcolor-row { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; border-bottom: 1px solid #e8e4df; }
.dcolor-name { font-size: 11px; letter-spacing: 1px; font-weight: 300; color: #333; font-family: 'IBM Plex Sans', sans-serif; }
.est-batch-note { font-size: 9px; color: #aaa; font-family: 'IBM Plex Mono', monospace; margin-top: 4px; letter-spacing: 0.5px; }

.qty-ctrl { display: flex; align-items: center; gap: 20px; }
.qty-btn { width: 24px; height: 24px; border: 1px solid #ccc; background: transparent; cursor: pointer; font-size: 14px; color: #666; display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; line-height: 1; transition: all 0.15s; }
.qty-btn:hover { border-color: #111; color: #111; }
.qty-num { font-size: 12px; min-width: 20px; text-align: center; color: #111; font-weight: 300; }
.dialog-next { display: block; width: 100%; padding: 18px 28px; background: #111; color: #f0ede8; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; border: none; cursor: pointer; font-weight: 300; text-align: left; transition: opacity 0.15s; }
.dialog-next:hover { opacity: 0.85; }

/* soldout whole item card */
.item-card.soldout { opacity: 0.4; pointer-events: none; }
.item-card.soldout .item-card-colors::after { content: ' — habis'; color: #c0392b; }

/* ── back ── */
.back-btn { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #888; background: none; border: none; cursor: pointer; font-family: 'IBM Plex Mono', monospace; padding: 28px 28px 0; display: block; font-weight: 300; }
.back-btn:hover { color: #111; }

/* ── page header ── */
.page-top { padding: 36px 28px 0; }
.page-num { font-size: 8px; letter-spacing: 4px; text-transform: uppercase; color: #aaa; margin-bottom: 18px; font-weight: 300; }
.page-title { font-size: 26px; font-weight: 300; color: #111; line-height: 1.3; font-family: 'IBM Plex Sans', sans-serif; letter-spacing: -0.3px; }
.page-title em { font-style: italic; color: #888; font-weight: 300; }

/* ── summary stripe ── */
.summary-stripe { margin: 32px 28px 0; border-top: 1px solid #bbb; }
.s-row { display: flex; justify-content: space-between; align-items: baseline; padding: 12px 0; border-bottom: 1px solid #e0dbd4; }
.s-name { font-size: 13px; font-weight: 400; color: #222; font-family: 'IBM Plex Sans', sans-serif; }
.s-color { font-size: 11px; color: #aaa; margin-left: 6px; font-weight: 300; }
.s-qty { font-size: 12px; color: #666; font-weight: 400; font-family: 'IBM Plex Mono', monospace; }

/* ── est inline ── */
.est-inline { margin: 0 28px; padding: 12px 0; border-bottom: 1px solid #e0dbd4; display: flex; justify-content: space-between; align-items: baseline; }
.est-inline-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #999; font-weight: 300; }
.est-inline-val { font-size: 12px; font-weight: 300; color: #333; font-family: 'IBM Plex Sans', sans-serif; text-align: right; }

/* ── fields ── */
.fields-wrap { padding: 36px 28px 0; }
.field-group { margin-bottom: 32px; }
.field-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #555; margin-bottom: 12px; display: block; font-weight: 500; }
.field-input { width: 100%; border: none; border-bottom: 1px solid #bbb; padding: 10px 0; font-family: 'IBM Plex Sans', sans-serif; font-size: 15px; font-weight: 400; color: #111; outline: none; background: transparent; transition: border-color 0.2s; -webkit-appearance: none; border-radius: 0; }
.field-input:focus { border-bottom-color: #111; }
.field-input::placeholder { color: #ccc; font-weight: 300; }

/* ── submit area ── */
.submit-area { padding: 40px 28px 100px; }
.submit-btn { display: block; width: 100%; padding: 18px; background: #111; color: #f0ede8; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; border: none; cursor: pointer; font-weight: 300; text-align: left; transition: opacity 0.15s; }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.submit-btn:hover:not(:disabled) { opacity: 0.85; }
.submit-note { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: #777; margin-top: 14px; font-weight: 400; }

/* ── review ── */
.review-section { margin: 40px 28px 0; }
.review-section-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #888; margin-bottom: 0; font-weight: 500; padding-bottom: 10px; border-bottom: 1px solid #ccc; }
.review-rows { }
.r-row { display: flex; justify-content: space-between; align-items: baseline; padding: 11px 0; border-bottom: 1px solid #e8e4df; gap: 16px; }
.r-key { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: #777; font-weight: 400; flex-shrink: 0; }
.r-val { font-size: 13px; color: #111; font-weight: 400; text-align: right; line-height: 1.5; font-family: 'IBM Plex Sans', sans-serif; }

/* ── done ── */
.done-page { min-height: 100vh; display: flex; flex-direction: column; padding: 32px 28px 40px; }
.done-header { display: flex; justify-content: space-between; align-items: flex-start; }
.done-brand { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; font-weight: 400; color: #111; }
.done-status { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #888; font-weight: 300; }
.done-main { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 72px 0 40px; }
.done-po-label { font-size: 8px; letter-spacing: 4px; text-transform: uppercase; color: #aaa; margin-bottom: 14px; font-weight: 300; }
.done-po-num { font-size: 48px; font-weight: 300; color: #111; letter-spacing: 4px; font-family: 'IBM Plex Sans', sans-serif; line-height: 1; }
.done-divider { width: 100%; height: 1px; background: #ccc; margin: 36px 0; }
.done-grid { display: grid; grid-template-columns: 1fr 1fr; }
.done-cell { padding: 18px 0; border-bottom: 1px solid #e0dbd4; }
.done-cell:nth-child(odd) { border-right: 1px solid #e0dbd4; padding-right: 20px; }
.done-cell:nth-child(even) { padding-left: 20px; }
.done-cell:nth-last-child(-n+2) { border-bottom: none; }
.done-cell-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #aaa; margin-bottom: 8px; font-weight: 300; }
.done-cell-val { font-size: 14px; color: #111; font-weight: 400; font-family: 'IBM Plex Sans', sans-serif; line-height: 1.4; }
.done-note { margin-top: 40px; font-size: 12px; color: #777; line-height: 1.8; font-weight: 300; font-family: 'IBM Plex Sans', sans-serif; }
.done-new-btn { margin-top: 40px; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: #aaa; background: none; border: none; cursor: pointer; font-family: 'IBM Plex Mono', monospace; padding: 0; text-decoration: underline; text-decoration-color: #d8d4ce; font-weight: 300; }
.done-footer { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #ccc; font-weight: 300; margin-top: 48px; }
</style>
</head>
<body>
<div id="root"></div>

<div id="cart-panel-overlay" class="cart-panel-overlay" onclick="closeCartPanel()">
  <div id="cart-panel-el" class="cart-panel" onclick="event.stopPropagation()">
    <div class="cart-panel-top">
      <span class="cart-panel-title">item dipilih</span>
      <button class="cart-panel-close" onclick="closeCartPanel()">×</button>
    </div>
    <div id="cart-panel-list"></div>
    <div class="cart-panel-footer">
      <div class="notes-area" style="border-top: 1px solid #e0dbd4; padding: 0 28px;">
        <div class="notes-toggle" onclick="toggleNotes()" id="notes-toggle">
          <span class="notes-label" style="margin-bottom:0;cursor:pointer;">notes <span class="notes-opt">(opsional)</span></span>
          <span id="notes-arrow" style="font-size:8px;color:#bbb;font-family:IBM Plex Mono,monospace;">+</span>
        </div>
        <div id="notes-collapse" style="overflow:hidden;max-height:0;transition:max-height 0.2s ease;">
          <input class="notes-input" placeholder="permintaan khusus, packaging, dll." value="" id="cart-notes-input" oninput="st.notes=this.value" style="margin-bottom:14px;">
        </div>
      </div>
      <button class="cart-panel-next" onclick="closeCartPanel();st.phase='customer';render()">lanjut →</button>
    </div>
  </div>
</div>

  <div id="dialog-el" class="dialog" onclick="event.stopPropagation()">
    <div class="dialog-top">
      <div>
        <div id="dialog-title" class="dialog-name"></div>
        <div class="dialog-hint">pilih warna & ukuran</div>
      </div>
      <button class="dialog-close" onclick="closeSheet()">×</button>
    </div>
    <div id="dialog-colors"></div>
    <button class="dialog-next" onclick="proceedFromDialog()">lanjut →</button>
  </div>
</div>

<script>
// sizes: array of size labels. 
// null = one size (no size selector, qty directly on color row)
const PRODUCTS = [
  { cat:"outerwear", name:"Rhea Jacket",      colors:["Breen","Bistre","Auburn"], sizes:["S/M","L/XL"], days:7  },
  { cat:"outerwear", name:"Phi Jacket",        colors:["Auburn","Breen"],          sizes:["S/M","L/XL"], days:7  },
  { cat:"outerwear", name:"The Classic Coat",  colors:["Ecru","Bistre"],           sizes:["S/M","L/XL"], days:10 },
  { cat:"outerwear", name:"The Overcape",      colors:["Ecru"],                    sizes:null,            days:10 },
  { cat:"outerwear", name:"Semi Blazer",       colors:["Grain"],                   sizes:["S","M","L"],   days:7  },
  { cat:"vest",      name:"Kiro Cropped Vest", colors:["Breen","Auburn"],          sizes:["S/M","L/XL"], days:5  },
  { cat:"vest",      name:"Minji Vest",        colors:["Breen","Bistre","Auburn"], sizes:["S/M","L/XL"], days:5  },
  { cat:"vest",      name:"Sichi Vest",        colors:["Auburn"],                  sizes:["S","M","L"],   days:5  },
  { cat:"shirt",     name:"Yuwa Shirt",        colors:["Pebble","Shell"],          sizes:["S/M","L/XL"], days:5  },
  { cat:"shirt",     name:"Riku Shirt",        colors:["Pebble","Shell"],          sizes:["S/M","L/XL"], days:5  },
  { cat:"shirt",     name:"Kato Shirt",        colors:["Pebble","Shell"],          sizes:["S/M","L/XL"], days:5  },
  { cat:"bottom",    name:"Miru Pants",        colors:["Bistre","Breen"],          sizes:["S","M","L"],   days:5  },
  { cat:"bottom",    name:"Kae Pants",         colors:["Bistre","Auburn"],         sizes:["S","M","L"],   days:5  },
  { cat:"bottom",    name:"Rho Pants",         colors:["Bistre","Breen"],          sizes:["S","M","L"],   days:5  },
];

const _supabase = supabase.createClient(
  "https://okgcujdlwkcwvsdybkza.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rZ2N1amRsd2tjd3ZzZHlia3phIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MzU2MzcsImV4cCI6MjA5NTIxMTYzN30.Zu6MzG4cXl9MUMcbAWV3U6wJ1SwM3Vzis4pu0UKFziM"
);

// cart key: "ArticleName||Color||Size"  (size = "OS" for one-size)
const st = { phase:"items", cart:{}, activeSheet:null, name:"", phone:"", address:"", notes:"", orderNum:null, savedEstDate:null };

let slotData = {}; // key: "Article · Color · Size" → { total, used, remaining, endsAt }
let batchLoaded = false;

async function loadBatchSlots() {
  try {
    const today = new Date().toISOString().slice(0,10);
    const { data: batches } = await _supabase.from('po_batches').select('*').gte('ends_at', today).order('ends_at', { ascending: true });
    const { data: activeOrders } = await _supabase.from('po_orders').select('id').in('status', ['baru','tunggu_ongkir','diproses']);
    const activeIds = new Set((activeOrders||[]).map(o => o.id));
    const { data: items } = await _supabase.from('po_items').select('article, color, size, qty, order_id');

    const usedMap = {};
    (items||[]).filter(i => activeIds.has(i.order_id)).forEach(i => {
      const sz = i.size || 'OS';
      const key = i.article + ' · ' + i.color + ' · ' + sz;
      usedMap[key] = (usedMap[key] || 0) + i.qty;
    });

    slotData = {};
    (batches||[]).forEach(b => {
      const slots = b.slots || {};
      Object.keys(slots).forEach(key => {
        if(slotData[key] && slotData[key].remaining > 0) return;
        const total = slots[key] || 0;
        const used = usedMap[key] || 0;
        const remaining = total - used;
        slotData[key] = { total, used, remaining, batchId: b.id, endsAt: b.ends_at };
      });
    });
  } catch(e) {
    console.warn('batch load failed', e);
  }
  batchLoaded = true;
  render();
}

function slotKey(article, color, size) {
  return article + ' · ' + color + ' · ' + (size || 'OS');
}
function getSlot(article, color, size) {
  return slotData[slotKey(article, color, size)] || null;
}
function isSoldout(article, color, size) {
  if(!batchLoaded) return false;
  const slot = getSlot(article, color, size);
  if(!slot) return false;
  return slot.remaining <= 0;
}
function isArticleSoldout(articleName) {
  const p = PRODUCTS.find(x => x.name === articleName);
  if(!p) return false;
  const sizes = p.sizes || ['OS'];
  return p.colors.every(c => sizes.every(s => isSoldout(articleName, c, s)));
}
function getCartEndsAt() {
  let latest = null;
  cartItems().forEach(i => {
    const slot = getSlot(i.name, i.color, i.size);
    if(slot && slot.endsAt) {
      if(!latest || slot.endsAt > latest) latest = slot.endsAt;
    }
  });
  return latest;
}
function getCartEstDate() {
  const raw = getCartEndsAt();
  if(!raw) return null;
  return new Date(raw).toLocaleDateString('id-ID', {day:'numeric',month:'long',year:'numeric'});
}

// cart key helpers
function k(n,c,s){ return n+"||"+c+"||"+(s||'OS'); }
function getQty(n,c,s){ return st.cart[k(n,c,s)]||0; }
function setQty(n,c,s,v){
  const key=k(n,c,s);
  if(v<=0) delete st.cart[key]; else st.cart[key]=Math.max(0,v);
  updateItemCard(n); updateCartFooter();
  // re-render the specific size row qty number in dialog
  const el=document.getElementById('dq-'+esc(n+c+(s||'OS')));
  if(el) el.textContent=getQty(n,c,s)||'—';
}
function totalQty(){ return Object.values(st.cart).reduce((a,b)=>a+b,0); }
function cartItems(){
  return Object.entries(st.cart).filter(([,q])=>q>0).map(([key,q])=>{
    const [n,c,s]=key.split("||");
    const p=PRODUCTS.find(x=>x.name===n);
    const slot=getSlot(n,c,s);
    return {name:n,color:c,size:s==='OS'?null:s,qty:q,days:p?.days||7,endsAt:slot?.endsAt||null};
  });
}
function itemTotalQty(n){
  return Object.entries(st.cart).filter(([key,q])=>key.startsWith(n+"||")&&q>0).reduce((a,[,q])=>a+q,0);
}
function maxDays(){ const c=cartItems(); return c.length?Math.max(...c.map(x=>x.days)):0; }
function estDisplay(){
  const d=getCartEstDate(); if(d) return d;
  const days=maxDays(); if(!days) return '—';
  return '±'+days+' hari kerja';
}
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;"); }

// ── dialog ──
function openSheet(name){
  st.activeSheet=name;
  const p=PRODUCTS.find(x=>x.name===name);
  document.getElementById("dialog-title").textContent=p.name;
  document.getElementById("dialog-hint") && null; // hint already in HTML
  renderDialogColors(p);
  document.getElementById("dialog-overlay").classList.add("open");
  document.getElementById("dialog-el").classList.add("open");
}
function closeSheet(){
  document.getElementById("dialog-overlay").classList.remove("open");
  document.getElementById("dialog-el").classList.remove("open");
  st.activeSheet=null;
  updateCartFooter();
}
function proceedFromDialog(){ closeSheet(); updateCartFooter(); }

function renderDialogColors(p){
  const isOneSize = !p.sizes;

  if(isOneSize){
    // One size: same as old color rows, qty directly on each color
    document.getElementById("dialog-colors").innerHTML = p.colors.map(col => {
      const q = getQty(p.name, col, 'OS');
      const slot = getSlot(p.name, col, 'OS');
      const soldout = isSoldout(p.name, col, 'OS');
      const estNote = slot && slot.endsAt && !soldout
        ? `<span class="est-batch-note">est. ${new Date(slot.endsAt).toLocaleDateString('id-ID',{day:'numeric',month:'long'})}</span>`
        : '';
      return `<div class="dcolor-row${soldout?' soldout':''}">
        <div>
          <span class="dcolor-name">${col}</span>
          ${estNote}
        </div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="setQty('${esc(p.name)}','${col}','OS',${q}-1)" ${soldout?'disabled':''}>−</button>
          <span class="qty-num" id="dq-${esc(p.name+col+'OS')}">${q||'—'}</span>
          <button class="qty-btn" onclick="setQty('${esc(p.name)}','${col}','OS',${q}+1)" ${soldout?'disabled':''}>+</button>
        </div>
      </div>`;
    }).join('');
    return;
  }

  // Has sizes: color section header + indented size rows
  document.getElementById("dialog-colors").innerHTML = p.colors.map(col => {
    // Pick earliest endsAt for this color (across all sizes)
    let colorEst = null;
    p.sizes.forEach(sz => {
      const slot = getSlot(p.name, col, sz);
      if(slot && slot.endsAt) { if(!colorEst || slot.endsAt < colorEst) colorEst = slot.endsAt; }
    });
    const allSoldout = p.sizes.every(sz => isSoldout(p.name, col, sz));
    const estLabel = colorEst && !allSoldout
      ? `<span class="dcolor-section-est">est. ${new Date(colorEst).toLocaleDateString('id-ID',{day:'numeric',month:'long'})}</span>`
      : (allSoldout ? `<span class="dcolor-section-soldout">habis</span>` : '');

    const sizeRows = p.sizes.map(sz => {
      const q = getQty(p.name, col, sz);
      const soldout = isSoldout(p.name, col, sz);
      const slot = getSlot(p.name, col, sz);
      // sisa label
      let sisaLabel = '';
      if(slot) {
        const rem = slot.remaining;
        const pct = slot.total > 0 ? rem/slot.total : 1;
        if(rem <= 0) sisaLabel = `<span class="dsize-sisa zero">habis</span>`;
        else if(pct < 0.2) sisaLabel = `<span class="dsize-sisa low">${rem} sisa</span>`;
        else sisaLabel = `<span class="dsize-sisa">${rem} sisa</span>`;
      }
      const safeName = p.name.replace(/'/g,"\\'");
      const safeSz = sz.replace(/'/g,"\\'");
      return `<div class="dsize-row${soldout?' soldout':''}">
        <span class="dsize-label">${sz}</span>
        ${sisaLabel}
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="setQty('${safeName}','${col}','${safeSz}',${q}-1)" ${soldout?'disabled':''}>−</button>
          <span class="qty-num" id="dq-${esc(p.name+col+sz)}">${q||'—'}</span>
          <button class="qty-btn" onclick="setQty('${safeName}','${col}','${safeSz}',${q}+1)" ${soldout?'disabled':''}>+</button>
        </div>
      </div>`;
    }).join('');

    return `<div class="dcolor-section">
      <div class="dcolor-section-header">
        <span class="dcolor-section-name">${col}</span>
        ${estLabel}
      </div>
      ${sizeRows}
    </div>`;
  }).join('');
}

// ── lightweight DOM updates ──
function updateItemCard(n){
  const card=document.getElementById("ic-"+esc(n));
  if(!card) return;
  const tq=itemTotalQty(n);
  card.classList.toggle("has-qty",tq>0);
  let badge=card.querySelector(".item-card-badge");
  if(tq>0){
    if(!badge){
      badge=document.createElement("div");
      badge.className="item-card-badge";
      badge.onclick=function(e){ e.stopPropagation(); openSheet(n); };
      card.appendChild(badge);
    }
    badge.textContent=tq;
  } else { if(badge) badge.remove(); }
}
function updateCartFooter(){
  const f=document.getElementById("cart-footer");
  if(!f||st.phase!=="items") return;
  const tq=totalQty();
  f.classList.toggle("visible",tq>0);
  const left=f.querySelector(".cf-left");
  if(left) left.innerHTML=`<strong>${tq} item</strong>est. ${estDisplay()}`;
}

function openCartPanel(){
  renderCartPanel();
  document.getElementById("cart-panel-overlay").classList.add("open");
  document.getElementById("cart-panel-el").classList.add("open");
  const ni=document.getElementById('cart-notes-input');
  if(ni) ni.value=st.notes;
  if(st.notes.trim()){
    const collapse=document.getElementById('notes-collapse');
    const arrow=document.getElementById('notes-arrow');
    if(collapse){ collapse.style.maxHeight='60px'; }
    if(arrow){ arrow.textContent='−'; }
  }
}
function closeCartPanel(){
  document.getElementById("cart-panel-overlay").classList.remove("open");
  document.getElementById("cart-panel-el").classList.remove("open");
}
function renderCartPanel(){
  const items=cartItems();
  document.getElementById("cart-panel-list").innerHTML=items.map(i=>{
    const meta = [i.color, i.size].filter(Boolean).join(' · ');
    const cartKey = k(i.name, i.color, i.size||'OS');
    return `<div class="cart-item-row">
      <span class="cart-item-name">${esc(i.name)}<span class="cart-item-meta"> / ${meta}</span></span>
      <div class="cart-item-right">
        <span class="cart-item-qty">${i.qty} pcs</span>
        <button class="cart-item-del" onclick="deleteCartItem('${cartKey}')">×</button>
      </div>
    </div>`;
  }).join("");
}
function deleteCartItem(cartKey){
  delete st.cart[cartKey];
  const parts=cartKey.split("||");
  updateItemCard(parts[0]);
  updateCartFooter();
  renderCartPanel();
  if(totalQty()===0) closeCartPanel();
}
function toggleNotes(){
  const collapse=document.getElementById('notes-collapse');
  const arrow=document.getElementById('notes-arrow');
  const isOpen=collapse.style.maxHeight!=='0px'&&collapse.style.maxHeight!=='';
  if(isOpen){
    collapse.style.maxHeight='0';
    arrow.textContent='+';
  } else {
    collapse.style.maxHeight='60px';
    arrow.textContent='−';
    setTimeout(()=>{ const ni=document.getElementById('cart-notes-input'); if(ni) ni.focus(); },220);
  }
}

// ── render ──
function render(){
  const root=document.getElementById("root");
  const items=cartItems();

  // ── done ──
  if(st.phase==="done"){
    root.innerHTML=`
    <div class="done-page">
      <div class="done-header">
        <div class="done-brand">Jedda</div>
        <div class="done-status">order received</div>
      </div>
      <div class="done-main">
        <div class="done-po-label">nomor pesanan</div>
        <div class="done-po-num">${st.orderNum}</div>
        <div class="done-divider"></div>
        <div class="done-grid">
          <div class="done-cell">
            <div class="done-cell-label">estimasi PO</div>
            <div class="done-cell-val">${st.savedEstDate||'—'}</div>
          </div>
          <div class="done-cell">
            <div class="done-cell-label">status</div>
            <div class="done-cell-val">sedang diproses</div>
          </div>
          <div class="done-cell">
            <div class="done-cell-label">nama</div>
            <div class="done-cell-val">${esc(st.name)}</div>
          </div>
          <div class="done-cell">
            <div class="done-cell-label">kontak</div>
            <div class="done-cell-val">${esc(st.phone)}</div>
          </div>
        </div>
        <div class="done-note">tim jedda akan menghubungi via whatsapp dalam 2x24 jam untuk konfirmasi pesanan dan informasi pengiriman.</div>
        <button class="done-new-btn" onclick="resetAll()">+ order baru</button>
      </div>
      <div class="done-footer">jedda — ${new Date().getFullYear()}</div>
    </div>`;
    return;
  }

  // ── review ──
  if(st.phase==="review"){
    const irows=items.map(i=>{
      const meta=[i.color,i.size].filter(Boolean).join(' · ');
      return `<div class="r-row">
        <span class="r-key">${esc(i.name)}</span>
        <span class="r-val">${meta} · ${i.qty} pcs</span>
      </div>`;
    }).join("");
    root.innerHTML=`
      <div class="header">
        <div class="header-brand">Jedda</div>
        <div class="header-meta">pre-order<br>${new Date().toLocaleDateString("id-ID",{month:"long",year:"numeric"})}</div>
      </div>
      <hr class="header-rule">
      <button class="back-btn" onclick="st.phase='customer';render()">← kembali</button>
      <div class="page-top">
        <div class="page-num">03 — konfirmasi</div>
        <div class="page-title"><em>konfirmasi</em> pesanan.</div>
      </div>
      <div class="review-section">
        <div class="review-section-label">item</div>
        <div class="review-rows">${irows}</div>
      </div>
      <div class="review-section">
        <div class="review-section-label">customer</div>
        <div class="review-rows">
          <div class="r-row"><span class="r-key">nama</span><span class="r-val">${esc(st.name)}</span></div>
          <div class="r-row"><span class="r-key">hp</span><span class="r-val">${esc(st.phone)}</span></div>
          <div class="r-row"><span class="r-key">alamat</span><span class="r-val">${esc(st.address)}</span></div>
          ${st.notes?`<div class="r-row"><span class="r-key">catatan</span><span class="r-val">${esc(st.notes)}</span></div>`:""}
        </div>
      </div>
      <div class="review-section">
        <div class="review-section-label">estimasi</div>
        <div class="review-rows">
          <div class="r-row"><span class="r-key">estimasi PO</span><span class="r-val">${estDisplay()}</span></div>
        </div>
      </div>
      <div class="submit-area">
        <button class="submit-btn" id="submit-btn" onclick="submitOrder()">confirm order →</button>
        <div class="submit-note">tim jedda akan menghubungi via whatsapp dalam 2x24 jam</div>
      </div>`;
    return;
  }

  // ── customer ──
  if(st.phase==="customer"){
    const srows=items.map(i=>{
      const meta=[i.color,i.size].filter(Boolean).join(' · ');
      return `<div class="s-row">
        <span class="s-name">${esc(i.name)}<span class="s-color">/ ${meta}</span></span>
        <span class="s-qty">${i.qty}</span>
      </div>`;
    }).join("");
    root.innerHTML=`
      <div class="header">
        <div class="header-brand">Jedda</div>
        <div class="header-meta">pre-order<br>data customer</div>
      </div>
      <hr class="header-rule">
      <button class="back-btn" onclick="st.phase='items';render()">← kembali</button>
      <div class="page-top">
        <div class="page-num">02 — data customer</div>
        <div class="page-title"><em>lengkapi</em> pesanan.</div>
      </div>
      <div class="summary-stripe">${srows}</div>
      <div class="est-inline">
        <span class="est-inline-label">estimasi PO</span>
        <span class="est-inline-val">${estDisplay()}</span>
      </div>
      <div class="fields-wrap">
        <div class="field-group">
          <label class="field-label">nama lengkap</label>
          <input class="field-input" id="f-name" placeholder="nama sesuai penerima" value="${esc(st.name)}" oninput="st.name=this.value">
        </div>
        <div class="field-group">
          <label class="field-label">nomor HP</label>
          <input class="field-input" id="f-phone" placeholder="08xx" type="tel" value="${esc(st.phone)}" oninput="st.phone=this.value">
        </div>
        <div class="field-group">
          <label class="field-label">alamat lengkap</label>
          <input class="field-input" id="f-addr" placeholder="jalan, kelurahan, kota, kode pos" value="${esc(st.address)}" oninput="st.address=this.value">
        </div>
      </div>
      <div class="submit-area">
        <button class="submit-btn" onclick="goReview()">lanjut →</button>
      </div>`;
    return;
  }

  // ── items ──
  const CATS_ORDER=["outerwear","vest","shirt","bottom"];
  const sections=CATS_ORDER.map(cat=>{
    const ps=PRODUCTS.filter(p=>p.cat===cat);
    if(!ps.length) return '';
    const cards=ps.map(p=>{
      const tq=itemTotalQty(p.name);
      const soldout=isArticleSoldout(p.name);
      const safeName=p.name.replace(/'/g,"\\'");
      const sizeLabel = p.sizes ? p.sizes.join(' · ') : 'one size';
      return `<div class="item-card ${tq>0?'has-qty':''} ${soldout?'soldout':''}" id="ic-${esc(p.name)}" onclick="openSheet('${safeName}')">
        <div class="item-card-name">${p.name}</div>
        <div class="item-card-colors">${p.colors.join(" · ")}</div>
        ${tq>0?`<div class="item-card-badge" onclick="event.stopPropagation();openSheet('${safeName}')">${tq}</div>`:""}
      </div>`;
    }).join("");
    return `<div class="cat-block">
      <div class="cat-label">${cat}</div>
      <div class="item-grid">${cards}</div>
    </div>`;
  }).join("");

  root.innerHTML=`
    <div class="header">
      <div class="header-brand">Jedda</div>
      <div class="header-meta">pre-order<br>${new Date().toLocaleDateString("id-ID",{month:"long",year:"numeric"})}</div>
    </div>
    <hr class="header-rule">
    <div class="items-eyebrow">
      <span class="eyebrow-left">01 — pilih item</span>
      <span class="eyebrow-right">${totalQty()>0?totalQty()+" dipilih":"—"}</span>
    </div>
    ${sections}
    <div style="height:100px"></div>
    <div id="cart-footer" class="cart-footer ${totalQty()>0?'visible':''}">
      <div class="cart-footer-inner" onclick="openCartPanel()">
        <div class="cf-left">
          <strong>${totalQty()} item</strong>est. ${estDisplay()}
        </div>
        <button class="cf-btn" onclick="event.stopPropagation();openCartPanel()">lihat →</button>
      </div>
    </div>`;
}

function goReview(){
  if(!st.name.trim()){ alert("nama wajib diisi."); return; }
  if(!st.phone.trim()){ alert("nomor HP wajib diisi."); return; }
  if(!st.address.trim()){ alert("alamat wajib diisi."); return; }
  st.phase="review"; render();
}

async function submitOrder(){
  const btn=document.getElementById('submit-btn');
  if(btn){ btn.disabled=true; btn.textContent="memproses..."; }
  try {
    let nextNum=1;
    try {
      const {data:last,error:le}=await _supabase.from("po_orders").select("po_number").order("id",{ascending:false}).limit(1);
      if(!le&&last&&last.length>0){ const n=parseInt(last[0].po_number.replace("JD-","")); if(!isNaN(n)) nextNum=n+1; }
    } catch(e){}
    const poNumber="JD-"+String(nextNum).padStart(4,"0");
    const md=maxDays();
    const {data:order,error:oe}=await _supabase.from("po_orders").insert({
      po_number:poNumber, customer_name:st.name.trim(), customer_phone:st.phone.trim(),
      customer_city:"", address:st.address.trim(), notes:st.notes.trim()||null,
      status:"baru", estimated_days:md, est_date: getCartEndsAt(),
    }).select().single();
    if(oe) throw oe;
    const {error:ie}=await _supabase.from("po_items").insert(
      cartItems().map(i=>({
        order_id:order.id,
        article:i.name,
        color:i.color,
        size:i.size||null,
        qty:i.qty
      }))
    );
    if(ie) throw ie;
    const raw = getCartEndsAt();
    st.savedEstDate = raw
      ? new Date(raw).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})
      : (md ? "±" + md + " hari kerja" : "—");
    st.orderNum=poNumber; st.phase="done"; render();
  } catch(err){
    let msg="unknown error";
    if(typeof err==="string") msg=err;
    else if(err?.message) msg=err.message;
    else if(err?.code) msg=`code: ${err.code}`;
    else { try{ msg=JSON.stringify(err); }catch(e){} }
    alert("Gagal submit:\n\n"+msg);
    if(btn){ btn.disabled=false; btn.textContent="confirm order →"; }
  }
}

function resetAll(){
  st.phase="items"; st.cart={}; st.activeSheet=null;
  st.name=""; st.phone=""; st.address=""; st.notes="";
  st.orderNum=null; st.savedEstDate=null; render();
}

loadBatchSlots();
</script>
</body>
</html>
