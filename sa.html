<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jedda — SA View</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=IBM+Plex+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #f0ede8; font-family: 'IBM Plex Mono', monospace; -webkit-font-smoothing: antialiased; color: #111; }
.main { max-width: 480px; margin: 0 auto; padding-bottom: 80px; }
.header { display: flex; justify-content: space-between; align-items: flex-start; padding: 32px 24px 0; }
.header-brand { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; font-weight: 400; color: #111; }
.header-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
.header-meta { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #888; line-height: 1.9; font-weight: 300; }
.header-rule { margin: 20px 0 0; border: none; border-top: 1px solid #ccc; }

/* channel toggle */
.channel-toggle { display: flex; gap: 0; padding: 0 24px; margin-top: 16px; border-bottom: 1px solid #d8d4ce; }
.ch-tab { padding: 9px 14px; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; font-weight: 300; color: #aaa; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
.ch-tab.active { color: #111; border-bottom-color: #111; font-weight: 400; }

.summary-bar { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid #d8d4ce; }
.sum-card { padding: 16px 20px; border-right: 1px solid #d8d4ce; }
.sum-card:last-child { border-right: none; }
.sum-label { font-size: 7px; letter-spacing: 3px; text-transform: uppercase; color: #aaa; font-weight: 300; margin-bottom: 6px; }
.sum-val { font-size: 26px; font-weight: 300; color: #111; font-family: 'IBM Plex Sans', sans-serif; letter-spacing: -0.5px; line-height: 1; }
.updated-bar { padding: 9px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #d8d4ce; }
.updated-text { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; color: #bbb; font-weight: 300; }
.refresh-btn { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; color: #888; font-weight: 300; background: none; border: none; cursor: pointer; font-family: 'IBM Plex Mono', monospace; padding: 0; }
.sa-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #d8d4ce; margin-top: 1px; }
.sa-card { background: #f0ede8; padding: 14px 16px; display: flex; flex-direction: column; gap: 0; }
.sa-art-name { font-size: 12px; font-weight: 400; font-family: 'IBM Plex Sans', sans-serif; color: #111; line-height: 1.3; margin-bottom: 8px; }
.sa-color-row { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; border-top: 1px solid #e8e4df; }
.sa-color-name { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 300; color: #888; }
.sa-est { font-size: 10px; font-family: 'IBM Plex Mono', monospace; font-weight: 400; }
.sa-est-active { color: #3a5a3a; }
.sa-est-temp   { color: #888; }
.sa-est-closed { color: #c0392b; font-weight: 300; font-size: 9px; }
</style>
</head>
<body>
<div class="main">
  <div class="header">
    <div class="header-brand">jedda</div>
    <div class="header-right">
      <div class="header-meta">sa view<br>stok & estimasi</div>
    </div>
  </div>
  <hr class="header-rule">
  <div class="channel-toggle" id="channel-toggle"></div>
  <div class="summary-bar">
    <div class="sum-card"><div class="sum-label">dibuka</div><div class="sum-val" id="sum-artikel">—</div></div>
    <div class="sum-card"><div class="sum-label">sisa slot</div><div class="sum-val" id="sum-sisa">—</div></div>
    <div class="sum-card"><div class="sum-label">habis</div><div class="sum-val" id="sum-habis">—</div></div>
  </div>
  <div class="updated-bar">
    <span class="updated-text" id="updated-text">memuat...</span>
    <button class="refresh-btn" onclick="loadData()">refresh ↺</button>
  </div>
  <div id="article-list"></div>
</div>

<script>
const _sb = supabase.createClient(
  "https://okgcujdlwkcwvsdybkza.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rZ2N1amRsd2tjd3ZzZHlia3phIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MzU2MzcsImV4cCI6MjA5NTIxMTYzN30.Zu6MzG4cXl9MUMcbAWV3U6wJ1SwM3Vzis4pu0UKFziM"
);

let channels = [];
let activeChannel = null;
let PRODUCTS = [];
let slotData = {};
let articleEstDays = {};

document.addEventListener('DOMContentLoaded', async () => {
  const { data: chs } = await _sb.from('po_channels').select('*').order('type').order('created_at');
  channels = chs || [];
  if(channels.length) activeChannel = channels[0].id;
  const { data: prods } = await _sb.from('po_products').select('*').eq('is_active', true).order('sort_order');
  PRODUCTS = prods || [];
  renderChannelTabs();
  await loadData();
});

function renderChannelTabs() {
  const el = document.getElementById('channel-toggle');
  el.innerHTML = channels.map(ch =>
    `<div class="ch-tab ${ch.id===activeChannel?'active':''}" onclick="switchChannel('${ch.id}')">${ch.name}</div>`
  ).join('');
}

async function switchChannel(chId) {
  activeChannel = chId;
  renderChannelTabs();
  await loadData();
}

async function loadData() {
  document.getElementById('updated-text').textContent = 'memuat...';
  try {
    const today = new Date().toISOString().slice(0,10);
    const [
      { data: batches },
      { data: activeOrders },
      { data: items },
      { data: settings }
    ] = await Promise.all([
      _sb.from('po_batches').select('*').eq('channel', activeChannel).gte('ends_at', today).order('ends_at', {ascending:true}),
      _sb.from('po_orders').select('id').eq('channel', activeChannel).in('status', ['baru','tunggu_ongkir','diproses']),
      _sb.from('po_items').select('article, color, size, qty, order_id'),
      _sb.from('po_settings').select('channel_est_days').eq('id', 1).single()
    ]);

    const allDays = settings?.channel_est_days || {};
    articleEstDays = allDays[activeChannel] || {};

    const activeIds = new Set((activeOrders||[]).map(o => o.id));
    const usedMap = {};
    (items||[]).filter(i => activeIds.has(i.order_id)).forEach(i => {
      const sz = i.size || 'OS';
      const key = i.article + ' · ' + i.color + ' · ' + sz;
      usedMap[key] = (usedMap[key] || 0) + i.qty;
    });

    slotData = {};
    (batches||[]).forEach(b => {
      const slots = b.slots || {};
      Object.keys(slots).forEach(key => {
        if(slotData[key] && slotData[key].remaining > 0) return;
        const total = slots[key] || 0;
        const used = usedMap[key] || 0;
        slotData[key] = { total, used, remaining: total - used, endsAt: b.ends_at };
      });
    });

    render();
    const now = new Date();
    document.getElementById('updated-text').textContent =
      'diperbarui ' + now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  } catch(e) {
    document.getElementById('updated-text').textContent = 'gagal memuat';
    console.error(e);
  }
}

function getSlot(a, c, s) { return slotData[a + ' · ' + c + ' · ' + (s||'OS')] || null; }
function daysUntil(ds) { if(!ds) return null; const diff = new Date(ds+'T00:00:00') - new Date(new Date().toDateString()); return Math.ceil(diff/86400000); }

function render() {
  const activeProds = PRODUCTS.filter(p => {
    const sizes = p.sizes || ['OS'];
    const hasBatch = p.colors.some(c => sizes.some(s => getSlot(p.name, c, s)));
    const hasEstDays = p.colors.some(c => (articleEstDays[p.name+' · '+c]||0)>0);
    return hasBatch || hasEstDays;
  });

  let totalSisa = 0, totalHabis = 0;
  activeProds.forEach(p => {
    const sizes = p.sizes || ['OS'];
    p.colors.forEach(c => sizes.forEach(s => {
      const sl = getSlot(p.name, c, s);
      if(!sl) return;
      if(sl.remaining <= 0) totalHabis++;
      else totalSisa += sl.remaining;
    }));
  });
  document.getElementById('sum-artikel').textContent = activeProds.length || '—';
  document.getElementById('sum-sisa').textContent = totalSisa || '—';
  document.getElementById('sum-habis').textContent = totalHabis || '—';

  const html = PRODUCTS.map(p => {
    const sizes = p.sizes || ['OS'];
    const colorRows = p.colors.map(c => {
      const colorHasBatch = sizes.some(s => getSlot(p.name, c, s));
      const estDays = articleEstDays[p.name+' · '+c] || 0;
      let estText, estCls;
      if(colorHasBatch) {
        let latestEndsAt = null;
        sizes.forEach(s => { const sl = getSlot(p.name, c, s); if(sl&&sl.endsAt){if(!latestEndsAt||sl.endsAt>latestEndsAt)latestEndsAt=sl.endsAt;} });
        const d = latestEndsAt ? daysUntil(latestEndsAt) : null;
        estText = d !== null ? '±'+d+' hari' : '—';
        estCls = 'sa-est-active';
      } else if(estDays > 0) {
        estText = '±'+estDays+' hari';
        estCls = 'sa-est-temp';
      } else {
        estText = 'blm dibuka';
        estCls = 'sa-est-closed';
      }
      return `<div class="sa-color-row"><span class="sa-color-name">${c}</span><span class="sa-est ${estCls}">${estText}</span></div>`;
    }).join('');
    return `<div class="sa-card"><span class="sa-art-name">${p.name}</span>${colorRows}</div>`;
  }).join('');

  document.getElementById('article-list').innerHTML = '<div class="sa-grid">' + html + '</div>';
}
</script>
</body>
</html>
