<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jedda — cek pesanan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=IBM+Plex+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #f0ede8; }
body { font-family: 'IBM Plex Mono', monospace; -webkit-font-smoothing: antialiased; color: #111; min-height: 100vh; background: #f0ede8; }

#root { max-width: 560px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }

/* ── header ── */
.header { display: flex; justify-content: space-between; align-items: flex-start; padding: 32px 28px 0; }
.header-brand { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; font-weight: 400; color: #111; }
.header-meta { text-align: right; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #888; line-height: 1.9; font-weight: 300; }
.header-rule { margin: 24px 0 0; border: none; border-top: 1px solid #ccc; }

/* ── search section ── */
.search-section { padding: 48px 28px 0; }
.search-eyebrow { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #888; font-weight: 400; margin-bottom: 20px; }
.search-field { display: flex; align-items: flex-end; gap: 0; border-bottom: 1px solid #bbb; padding-bottom: 10px; transition: border-color 0.2s; }
.search-field:focus-within { border-bottom-color: #111; }
.search-input { flex: 1; border: none; background: transparent; font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 300; color: #111; outline: none; letter-spacing: 1px; }
.search-input::placeholder { color: #bbb; font-size: 18px; font-weight: 300; }
.search-btn { background: none; border: none; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #888; font-weight: 400; padding: 0 0 2px; white-space: nowrap; transition: color 0.15s; }
.search-btn:hover { color: #111; }
.search-hint { font-size: 9px; color: #999; margin-top: 10px; font-weight: 400; letter-spacing: 0.5px; }
.search-error { font-size: 9px; color: #c0392b; margin-top: 10px; font-weight: 300; letter-spacing: 0.5px; }

.result { padding: 36px 28px 0; display: none; }
.result.visible { display: block; }

/* ── status area ── */
.status-area { margin-bottom: 24px; text-align: center; }
.status-po { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #aaa; font-weight: 300; margin-bottom: 8px; }
.status-name { font-size: 24px; font-weight: 300; font-family: 'IBM Plex Sans', sans-serif; color: #111; margin-bottom: 16px; }

/* ── illustration ── */
.illus-wrap { margin-bottom: 16px; height: 64px; display: flex; align-items: center; justify-content: center; }

/* ── status label + subjudul ── */
.status-label { font-size: 28px; font-weight: 300; font-family: 'IBM Plex Sans', sans-serif; color: #111; margin-bottom: 8px; }
.status-label em { font-style: italic; color: #888; }
.status-sub { font-size: 12px; font-weight: 300; color: #666; font-family: 'IBM Plex Sans', sans-serif; line-height: 1.6; margin-bottom: 12px; }

/* ── rotating text ── */
.rotating-wrap { height: 18px; overflow: hidden; margin-bottom: 20px; display: flex; justify-content: center; }
.rotating-text { font-size: 10px; font-weight: 300; color: #aaa; letter-spacing: 1px; font-family: 'IBM Plex Mono', monospace; opacity: 0; transition: opacity 0.6s; position: absolute; }
.rotating-text.visible { opacity: 1; }

/* ── stepper ── */
.stepper { display: flex; align-items: center; gap: 0; margin-bottom: 24px; }
.step-item { display: flex; align-items: center; gap: 0; flex: 1; }
.step-dot { width: 7px; height: 7px; border-radius: 50%; border: 1px solid #ccc; background: transparent; flex-shrink: 0; transition: all 0.4s; }
.step-dot.done { background: #888; border-color: #888; }
.step-dot.current { background: #111; border-color: #111; box-shadow: 0 0 0 3px rgba(17,17,17,0.12); }
.step-line { flex: 1; height: 1px; background: #d8d4ce; transition: background 0.4s; }
.step-line.done { background: #888; }
.step-label { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 300; color: #ccc; margin-top: 8px; white-space: nowrap; }
.step-label.done { color: #888; }
.step-label.current { color: #111; font-weight: 400; }
.step-col { display: flex; flex-direction: column; align-items: center; }

/* ── est block ── */
.est-block { border: 1px solid #d8d4ce; padding: 14px 18px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
.est-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #aaa; font-weight: 300; margin-bottom: 6px; }
.est-date { font-size: 16px; font-weight: 400; color: #111; font-family: 'IBM Plex Sans', sans-serif; }
.est-days { font-size: 10px; font-weight: 300; color: #888; margin-top: 3px; }

/* ── resi block ── */
.resi-block { border: 1px solid #d8d4ce; padding: 14px 18px; margin-bottom: 20px; }
.resi-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #aaa; font-weight: 300; margin-bottom: 6px; }
.resi-val { font-size: 14px; font-weight: 300; color: #111; letter-spacing: 0.5px; }
.resi-kurir { font-size: 9px; color: #aaa; margin-top: 3px; letter-spacing: 1px; text-transform: uppercase; }

/* ── separator ── */
.sep { border: none; border-top: 1px solid #e0dbd4; margin-bottom: 16px; }

/* ── order summary ── */
.summary-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #bbb; font-weight: 300; padding-bottom: 8px; border-bottom: 1px solid #d8d4ce; margin-bottom: 0; }
.summary-row { display: flex; justify-content: space-between; align-items: baseline; padding: 9px 0; border-bottom: 1px solid #eae6e0; gap: 12px; }
.summary-row:last-child { border-bottom: none; }
.summary-key { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: #888; font-weight: 300; flex-shrink: 0; }
.summary-val { font-size: 13px; font-weight: 300; text-align: right; font-family: 'IBM Plex Sans', sans-serif; color: #111; line-height: 1.5; }

/* ── contact ── */
.contact-section { margin-top: 28px; padding-top: 20px; border-top: 1px solid #e0dbd4; }
.contact-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: #bbb; font-weight: 300; margin-bottom: 14px; }
.contact-hint { font-size: 11px; font-weight: 300; color: #888; font-family: 'IBM Plex Sans', sans-serif; margin-bottom: 16px; line-height: 1.6; }
.contact-links { display: flex; gap: 12px; }
.contact-btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 14px; font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; font-weight: 300; border: 1px solid #ccc; color: #666; text-decoration: none; transition: all 0.15s; }
.contact-btn:hover { border-color: #111; color: #111; }
.contact-btn-wa { border-color: #25d366; color: #1a9e4c; }
.contact-btn-wa:hover { background: #25d366; color: #fff; }

/* ── cek lagi ── */
.reset-btn { margin-top: 40px; display: inline-block; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #bbb; font-weight: 300; background: none; border: none; cursor: pointer; font-family: 'IBM Plex Mono', monospace; text-decoration: underline; text-decoration-color: #ddd; transition: color 0.15s; }
.reset-btn:hover { color: #555; }

/* ── animations ── */

/* pulse dot for menunggu */
@keyframes pulse-ring {
  0%   { transform: scale(0.8); opacity: 0.6; }
  50%  { transform: scale(1.2); opacity: 0.2; }
  100% { transform: scale(0.8); opacity: 0.6; }
}
.illus-pulse { position: relative; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
.illus-pulse-core { width: 10px; height: 10px; border-radius: 50%; background: #bbb; }
.illus-pulse-ring { position: absolute; width: 30px; height: 30px; border-radius: 50%; border: 1px solid #bbb; animation: pulse-ring 2s ease-in-out infinite; }
.illus-pulse-ring2 { animation-delay: 0.7s; width: 40px; height: 40px; }

/* sewing machine for in production */
@keyframes needle-updown {
  0%   { transform: translateY(0px); }
  40%  { transform: translateY(14px); }
  50%  { transform: translateY(14px); }
  90%  { transform: translateY(0px); }
  100% { transform: translateY(0px); }
}
@keyframes fabric-move {
  0%   { transform: translateX(0px); }
  100% { transform: translateX(-18px); }
}
@keyframes stitch-appear {
  0%   { stroke-dashoffset: 40; }
  100% { stroke-dashoffset: 0; }
}
.illus-sm-needle { animation: needle-updown 0.7s ease-in-out infinite; transform-origin: center top; }
.illus-sm-fabric { animation: fabric-move 3s linear infinite; }
.illus-sm-stitch { stroke-dasharray: 4 3; animation: stitch-appear 3s linear infinite; }

/* box for dikirim */
@keyframes box-slide {
  0%   { transform: translateX(0px); }
  50%  { transform: translateX(12px); }
  100% { transform: translateX(0px); }
}
.illus-box { animation: box-slide 2.4s ease-in-out infinite; }
@keyframes line-fade {
  0%, 100% { opacity: 0.3; }
  50%       { opacity: 0.8; }
}
.illus-line1 { animation: line-fade 2.4s ease-in-out infinite; }
.illus-line2 { animation: line-fade 2.4s ease-in-out infinite 0.3s; }
.illus-line3 { animation: line-fade 2.4s ease-in-out infinite 0.6s; }
</style>
</head>

// status config — customer-facing

const STEPS = [

// illustrations
function illusPulse() {

// rotating text
let rotatingInterval = null;
let rotatingIdx = 0;
function startRotating(texts) {
  stopRotating();
  rotatingIdx = 0;
  const el = document.getElementById("rotating-text");
  function show() {
    el.classList.remove("visible");
    setTimeout(() => {
      el.textContent = texts[rotatingIdx % texts.length];
      el.classList.add("visible");
      rotatingIdx++;
    }, 400);
  }
  show();
  rotatingInterval = setInterval(show, 3200);
}
function stopRotating() {
  if(rotatingInterval) { clearInterval(rotatingInterval); rotatingInterval = null; }
}

function getEstDate(days, from) {
  const d = new Date(from); d.setDate(d.getDate() + days);
  return d.toLocaleDateString("id-ID", {day:"numeric", month:"long", year:"numeric"});
}
function getEstDaysLeft(days, from) {
  const est = new Date(from); est.setDate(est.getDate() + days);
  return Math.ceil((est - Date.now()) / 86400000);
}

async function doSearch() {
  let val = document.getElementById("po-input").value.trim().toUpperCase();
  document.getElementById("po-input").value = val;
  if(!val) return;
  const hint = document.getElementById("search-hint");
  hint.className = "search-hint";
  hint.textContent = "mencari...";

  try {
    const { data: orders, error } = await _sb
      .from("po_orders").select("*").eq("po_number", val).limit(1);
    if(error) throw error;
    if(!orders || orders.length === 0) {
      hint.className = "search-error";
      hint.textContent = "nomor PO tidak ditemukan. coba cek kembali.";
      return;
    }
    const o = orders[0];
    const { data: items } = await _sb.from("po_items").select("*").eq("order_id", o.id);
    hint.className = "search-hint";
    hint.textContent = "";
    showResult(o, items || []);
  } catch(e) {
    hint.className = "search-error";
    hint.textContent = "terjadi kesalahan. coba lagi.";
  }
}

function showResult(o, items) {
  const cfg = STATUS_CONFIG[o.status] || STATUS_CONFIG["baru"];

  // Estimasi: prioritas est_date dari batch, fallback estimated_days (hari kerja Senin-Sabtu)
  function addWorkdays(from, days) {
    const d = new Date(from);
    let added = 0;
    while(added < days) { d.setDate(d.getDate()+1); if(d.getDay()!==0) added++; }
    return d;
  }
  const fmtTgl = d => new Date(d).toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"});
  let estLabel, estDaysLabel;
  let estDateObj;
  if(o.est_date) {
    estDateObj = new Date(o.est_date + 'T00:00:00');
  } else {
    const maxDays = o.estimated_days || 7;
    estDateObj = addWorkdays(new Date(o.created_at), maxDays);
  }
  const today = new Date(); today.setHours(0,0,0,0);
  const daysLeft = Math.round((estDateObj - today) / 86400000);
  estLabel = fmtTgl(estDateObj);
  estDaysLabel = daysLeft < 0 ? 'terlambat kirim' : daysLeft === 0 ? 'hari ini' : daysLeft + ' hari lagi';

  // header info
  document.getElementById("res-po").textContent = o.po_number;
  document.getElementById("res-name").textContent = o.customer_name;

  // illustration
  const illusWrap = document.getElementById("illus-wrap");
  if(cfg.illus === "pulse") illusWrap.innerHTML = illusPulse();
  else if(cfg.illus === "needle") illusWrap.innerHTML = illusNeedle();
  else illusWrap.innerHTML = illusBox();

  // status label + sub
  document.getElementById("res-status-label").innerHTML = cfg.label;
  document.getElementById("res-status-sub").textContent = cfg.sub;

  // rotating text
  startRotating(cfg.rotating);

  // stepper
  const stepHtml = `<div class="stepper">` + STEPS.map((s, i) => {
    const isDone = cfg.stepIdx > i;
    const isCurrent = cfg.stepIdx === i;
    const lineClass = isDone ? "done" : "";
    return `
      <div class="step-col">
        <div class="step-dot ${isDone?'done':''} ${isCurrent?'current':''}"></div>
        <div class="step-label ${isDone?'done':''} ${isCurrent?'current':''}">${s.label}</div>
      </div>
      ${i < STEPS.length - 1 ? `<div class="step-line ${lineClass}" style="margin-bottom:18px"></div>` : ""}
    `;
  }).join("") + `</div>`;
  document.getElementById("stepper-wrap").innerHTML = stepHtml;

  // est
  document.getElementById("res-est-date").textContent = estLabel;
  const daysEl = document.getElementById("res-est-days");
  if(daysEl) daysEl.textContent = (o.status !== "dikirim") ? estDaysLabel || "" : "";

  // est block: sembunyikan kalau sudah dikirim
  document.getElementById("est-block").style.display = (o.status === "dikirim" || o.status === "siap" || o.status === "selesai") ? "none" : "block";

  // resi block: tampilkan kalau dikirim
  if((o.status === "dikirim" || o.status === "siap" || o.status === "selesai") && o.resi) {
    document.getElementById("res-resi").textContent = o.resi;
    document.getElementById("res-kurir").textContent = o.kurir || "";
    document.getElementById("resi-block").style.display = "block";
  } else {
    document.getElementById("resi-block").style.display = "none";
  }

  // summary
  const summaryRows = [
    { key: "nama", val: o.customer_name },
    { key: "no. hp", val: o.customer_phone },
    ...items.map(i => {
      const meta = [i.color, i.size].filter(Boolean).join(' · ');
      return { key: i.article, val: meta + " · " + i.qty + " pcs" };
    })
  ];
  document.getElementById("summary-rows").innerHTML = summaryRows.map(r =>
    `<div class="summary-row">
      <span class="summary-key">${r.key}</span>
      <span class="summary-val">${r.val}</span>
    </div>`
  ).join("");

  // WA link
  const waNum = (o.customer_phone || "").replace(/^0/, "62").replace(/\D/g, "");
  document.getElementById("wa-link").href = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent("Halo Jedda, saya ingin menanyakan pesanan " + o.po_number + " atas nama " + o.customer_name + ".")}`;

  // show result
  document.getElementById("result").classList.add("visible");
  document.getElementById("result").scrollIntoView({ behavior: "smooth", block: "start" });
}

function doReset() {
  stopRotating();
  document.getElementById("result").classList.remove("visible");
  document.getElementById("po-input").value = "";
  document.getElementById("search-hint").className = "search-hint";
  document.getElementById("search-hint").textContent = "masukkan nomor PO yang kamu terima.";
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// auto-load dari URL param ?id=JD-XXXX
window.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);
  const id = (params.get("id") || "").trim().toUpperCase();
  if(id) {
    document.getElementById("po-input").value = id;
    doSearch();
  }
});
</script>
